<!DOCTYPE html>
<html lang="en">
<head>

<title>Starter Circuits — Post-ECM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#2a9d8f;--teal-bg:#f0faf8;--teal-dk:#0d2b28;
  --amber:#e9a825;--amber-bg:#fffbf0;
  --dark:#1a1a1a;--muted:#555555;--lgray:#f5f5f5;--white:#fff;--red:#cc0000;
}
html,body{height:100%;font-family:"Source Sans 3",Arial,sans-serif;background:var(--dark);color:var(--dark);font-size:15px;line-height:1.5}
#shell{display:flex;flex-direction:column;min-height:100vh;max-width:780px;margin:0 auto;background:var(--white)}
header{background:var(--dark);border-top:5px solid var(--teal);padding:12px 20px 10px}
.course-label{color:var(--teal);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
header h1{font-family:"Oswald",Arial,sans-serif;font-size:17px;color:#fff;font-weight:700;margin-bottom:1px;line-height:1.2}
header .sub{color:#aaa;font-size:11.5px}
#prog-wrap{background:#2a2a2a;border-bottom:1px solid #333;padding:8px 20px 7px}
#prog-lbl{color:#aaa;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
#prog-track{background:#3a3a3a;border-radius:4px;height:6px;overflow:hidden}
#prog-bar{background:var(--amber);height:100%;border-radius:4px;width:0%;transition:width .35s ease}
#content{flex:1;padding:16px 18px 12px;overflow-y:auto}
.slide,.quiz{display:none;animation:fi .25s ease}
.slide.active,.quiz.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.slide-icon{font-size:26px;display:block;margin-bottom:5px}
.slide h2{font-family:"Oswald",Arial,sans-serif;font-size:18px;font-weight:700;color:var(--teal);margin-bottom:8px;line-height:1.2}
.slide-svg{width:100%;margin:6px 0 10px;display:block}
.slide-body{background:var(--lgray);border-left:4px solid var(--teal);border-radius:0 7px 7px 0;padding:11px 14px;font-size:13.5px;line-height:1.6}
.slide-body p{margin-bottom:6px}.slide-body p:last-child{margin-bottom:0}
.quiz-lbl{color:var(--teal);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.quiz h2{font-size:14.5px;font-weight:700;color:var(--dark);margin-bottom:12px;line-height:1.45}
.choices{list-style:none;display:flex;flex-direction:column;gap:7px}
.ch-btn{display:flex;align-items:flex-start;gap:9px;background:#fff;border:2px solid #d0d0d0;border-radius:7px;padding:9px 12px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;font-size:13.5px;line-height:1.45;color:var(--dark);text-align:left;transition:border-color .15s,background .15s;width:100%}
.ch-btn:hover:not(:disabled){border-color:var(--teal);background:var(--teal-bg)}
.letter{flex-shrink:0;background:#e8e8e8;color:var(--muted);font-weight:700;font-size:11.5px;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background .15s,color .15s}
.ch-btn.correct{border-color:var(--teal);background:var(--teal-bg)}.ch-btn.correct .letter{background:var(--teal);color:#fff}
.ch-btn.wrong{border-color:var(--red);background:#fff5f5}.ch-btn.wrong .letter{background:var(--red);color:#fff}
.ch-btn.revealed{border-color:var(--teal);background:var(--teal-bg);opacity:.6}.ch-btn.revealed .letter{background:var(--teal);color:#fff}
.ch-btn:disabled{cursor:default}
.feedback{display:none;margin-top:10px;padding:11px 13px;border-radius:7px;font-size:13px;line-height:1.5}
.feedback.correct{display:block;background:var(--teal-bg);border-left:4px solid var(--teal)}
.feedback.wrong{display:block;background:#fff5f5;border-left:4px solid var(--red)}
.feedback strong{display:block;margin-bottom:2px}
#complete{display:none;background:var(--teal-dk);border:2px solid var(--teal);border-radius:10px;padding:20px;text-align:center;animation:fi .4s ease}
#complete .ck{font-size:34px;margin-bottom:5px;display:block}
#complete h3{font-family:"Oswald",Arial,sans-serif;font-size:19px;color:var(--teal);margin-bottom:3px}
#complete p{color:#ccc;font-size:12.5px;margin-bottom:12px}
.restart{display:inline-block;background:transparent;color:var(--teal);border:1.5px solid var(--teal);padding:6px 16px;border-radius:5px;font-size:12.5px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s,color .15s}
.restart:hover{background:var(--teal);color:#fff}
#nav{background:#f5f5f5;border-top:2px solid var(--teal);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
#step-ind{font-size:11.5px;color:var(--muted);text-align:center;flex:1}
.nbtn{background:var(--dark);color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s;min-width:74px}
.nbtn:hover{background:var(--teal)}.nbtn:disabled,.nbtn.locked{background:#ccc;color:#888;cursor:default}
</style>
</head>

<script>
const SL=[{"heading": "What Changed When the ECM Got Involved", "icon": "🖥️", "svg": "<svg viewBox=\"0 0 700 210\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"16\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">POST-ECM STARTING CIRCUIT — ECM IN CONTROL</text><rect x=\"270\" y=\"70\" width=\"160\" height=\"90\" fill=\"#0d2b28\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" rx=\"8\"/><text x=\"350\" y=\"95\" font-size=\"16\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ECM</text><text x=\"350\" y=\"113\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Checks conditions</text><text x=\"350\" y=\"126\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">before allowing crank</text><text x=\"45\" y=\"30\" font-size=\"9.5\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">INPUTS</text><rect x=\"20\" y=\"40\" width=\"120\" height=\"28\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"80\" y=\"58\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Ignition SW (ST signal)</text><rect x=\"20\" y=\"78\" width=\"120\" height=\"28\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"80\" y=\"96\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Park/Neutral Switch</text><rect x=\"20\" y=\"116\" width=\"120\" height=\"28\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"80\" y=\"134\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Brake Switch (some)</text><rect x=\"20\" y=\"154\" width=\"120\" height=\"28\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"80\" y=\"172\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Immobilizer / Security</text><defs><marker id=\"ah6687\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"140\" y1=\"54\" x2=\"268\" y2=\"100\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah6687)\"/><defs><marker id=\"ah2063\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"140\" y1=\"92\" x2=\"268\" y2=\"108\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah2063)\"/><defs><marker id=\"ah2794\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"140\" y1=\"130\" x2=\"268\" y2=\"116\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah2794)\"/><defs><marker id=\"ah8322\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"140\" y1=\"168\" x2=\"268\" y2=\"124\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah8322)\"/><text x=\"545\" y=\"30\" font-size=\"9.5\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">OUTPUT</text><rect x=\"560\" y=\"70\" width=\"110\" height=\"32\" fill=\"#ffffff\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"4\"/><text x=\"615\" y=\"91\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Starter Relay</text><defs><marker id=\"ah2664\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#2a9d8f\"/></marker></defs><line x1=\"430\" y1=\"100\" x2=\"558\" y2=\"86\" stroke=\"#2a9d8f\" stroke-width=\"2\" marker-end=\"url(#ah2664)\"/><rect x=\"560\" y=\"118\" width=\"110\" height=\"32\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"4\"/><text x=\"615\" y=\"138\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Starter Motor</text><defs><marker id=\"ah1697\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#2a9d8f\"/></marker></defs><line x1=\"615\" y1=\"102\" x2=\"615\" y2=\"116\" stroke=\"#2a9d8f\" stroke-width=\"2\" marker-end=\"url(#ah1697)\"/><text x=\"350\" y=\"178\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">ALL conditions must check out before ECM grounds relay coil</text><text x=\"350\" y=\"193\" font-size=\"9.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">One condition fails → no relay → no crank</text></svg>", "body": ["The ECM sits in the middle of the control circuit. The ignition switch no longer directly energizes the relay coil — it sends a <strong>starter request signal</strong> to the ECM instead.", "The ECM checks its conditions (PNP, brake, security, start-stop) before grounding the relay coil. All conditions must pass.", "<strong>Result:</strong> More things can prevent a crank that have nothing to do with batteries or cables."]}, {"heading": "The ECM's Decision Process", "icon": "📡", "svg": "<svg viewBox=\"0 0 700 240\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"16\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ECM START LOGIC — SIMPLIFIED</text><rect x=\"295\" y=\"28\" width=\"110\" height=\"28\" fill=\"#1a1a1a\" stroke=\"#1a1a1a\" stroke-width=\"0\" rx=\"14\"/><text x=\"350\" y=\"47\" font-size=\"10\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Key → START</text><defs><marker id=\"ah1005\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#1a1a1a\"/></marker></defs><line x1=\"350\" y1=\"56\" x2=\"350\" y2=\"72\" stroke=\"#1a1a1a\" stroke-width=\"2\" marker-end=\"url(#ah1005)\"/><rect x=\"240\" y=\"72\" width=\"220\" height=\"28\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"5\"/><text x=\"350\" y=\"91\" font-size=\"9.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">ST signal received by ECM?</text><defs><marker id=\"ah9659\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#1a1a1a\"/></marker></defs><line x1=\"350\" y1=\"100\" x2=\"350\" y2=\"116\" stroke=\"#1a1a1a\" stroke-width=\"2\" marker-end=\"url(#ah9659)\"/><text x=\"460\" y=\"87\" font-size=\"8.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">NO → check ign switch</text><line x1=\"460\" y1=\"91\" x2=\"458\" y2=\"91\" stroke=\"#cc0000\" stroke-width=\"0.5\"/><rect x=\"240\" y=\"116\" width=\"220\" height=\"28\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"5\"/><text x=\"350\" y=\"135\" font-size=\"9.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">PNP in Park or Neutral?</text><defs><marker id=\"ah8709\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#1a1a1a\"/></marker></defs><line x1=\"350\" y1=\"144\" x2=\"350\" y2=\"160\" stroke=\"#1a1a1a\" stroke-width=\"2\" marker-end=\"url(#ah8709)\"/><text x=\"460\" y=\"131\" font-size=\"8.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">NO → PNP fault</text><rect x=\"240\" y=\"160\" width=\"220\" height=\"28\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"5\"/><text x=\"350\" y=\"179\" font-size=\"9.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Security / Immobilizer OK?</text><defs><marker id=\"ah9941\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#1a1a1a\"/></marker></defs><line x1=\"350\" y1=\"188\" x2=\"350\" y2=\"204\" stroke=\"#1a1a1a\" stroke-width=\"2\" marker-end=\"url(#ah9941)\"/><rect x=\"270\" y=\"204\" width=\"160\" height=\"28\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"6\"/><text x=\"350\" y=\"223\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ECM grounds relay → CRANK</text></svg>", "body": ["Work through the logic in order. The first condition that fails is your fault location.", "If the ECM doesn't receive the ST signal at all → fault before the ECM input (ignition switch, wiring, fuse).", "If ECM receives ST signal but won't crank → fault in one of the conditions it checks (PNP, security, brake switch, start-stop inhibit)."]}, {"heading": "Scan Tool First — Always", "icon": "🔍", "svg": "<svg viewBox=\"0 0 700 215\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"16\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">SCAN TOOL DATA LIST — USE THIS FIRST</text><rect x=\"100\" y=\"28\" width=\"500\" height=\"170\" fill=\"#1a1a1a\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"8\"/><rect x=\"115\" y=\"40\" width=\"470\" height=\"145\" fill=\"#111111\" stroke=\"#333333\" stroke-width=\"1\" rx=\"4\"/><rect x=\"115\" y=\"40\" width=\"470\" height=\"22\" fill=\"#1a3a36\" stroke=\"#2a9d8f\" stroke-width=\"0\" rx=\"0\"/><text x=\"350\" y=\"56\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">DATA LIST — ENGINE / STARTING SYSTEM</text><rect x=\"115\" y=\"62\" width=\"470\" height=\"20\" fill=\"#0d0d0d\" stroke=\"#0d0d0d\" stroke-width=\"0\" rx=\"0\"/><text x=\"210\" y=\"76\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"start\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Starter Signal (ST SW)</text><rect x=\"500\" y=\"65\" width=\"70\" height=\"14\" fill=\"#cc0000\" stroke=\"#cc0000\" stroke-width=\"0\" rx=\"2\"/><text x=\"535\" y=\"76\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">OFF</text><text x=\"450\" y=\"76\" font-size=\"8\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">◄ KEY IN START</text><rect x=\"115\" y=\"82\" width=\"470\" height=\"20\" fill=\"#111111\" stroke=\"#111111\" stroke-width=\"0\" rx=\"0\"/><text x=\"210\" y=\"96\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"start\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Park/Neutral Switch</text><rect x=\"500\" y=\"85\" width=\"70\" height=\"14\" fill=\"#2a9d8f\" stroke=\"#2a9d8f\" stroke-width=\"0\" rx=\"2\"/><text x=\"535\" y=\"96\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">PARK</text><rect x=\"115\" y=\"102\" width=\"470\" height=\"20\" fill=\"#0d0d0d\" stroke=\"#0d0d0d\" stroke-width=\"0\" rx=\"0\"/><text x=\"210\" y=\"116\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"start\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Brake Switch</text><rect x=\"500\" y=\"105\" width=\"70\" height=\"14\" fill=\"#2a9d8f\" stroke=\"#2a9d8f\" stroke-width=\"0\" rx=\"2\"/><text x=\"535\" y=\"116\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ON</text><rect x=\"115\" y=\"122\" width=\"470\" height=\"20\" fill=\"#111111\" stroke=\"#111111\" stroke-width=\"0\" rx=\"0\"/><text x=\"210\" y=\"136\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"start\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Immobilizer Status</text><rect x=\"500\" y=\"125\" width=\"70\" height=\"14\" fill=\"#2a9d8f\" stroke=\"#2a9d8f\" stroke-width=\"0\" rx=\"2\"/><text x=\"535\" y=\"136\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">AUTH</text><rect x=\"115\" y=\"142\" width=\"470\" height=\"20\" fill=\"#0d0d0d\" stroke=\"#0d0d0d\" stroke-width=\"0\" rx=\"0\"/><text x=\"210\" y=\"156\" font-size=\"9.5\" fill=\"#ffaa00\" text-anchor=\"start\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Active DTCs</text><text x=\"420\" y=\"156\" font-size=\"9\" fill=\"#ffaa00\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">P0615 — Starter Relay Circuit</text><rect x=\"115\" y=\"162\" width=\"470\" height=\"23\" fill=\"#0a2520\" stroke=\"#2a9d8f\" stroke-width=\"0\" rx=\"0\"/><text x=\"350\" y=\"177\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Starter signal OFF with key in START = fault before ECM input</text><text x=\"350\" y=\"208\" font-size=\"9.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">If ST signal reads OFF → fault is between ignition switch and ECM</text></svg>", "body": ["On a modern vehicle, three minutes with a scan tool before touching a DVOM can eliminate 80% of the wiring diagram from suspicion.", "Check the <strong>starter signal PID</strong> with key in START. ON = ECM received the request. OFF = fault before ECM.", "Check <strong>PNP switch status</strong>, <strong>security/immobilizer status</strong>, and any stored DTCs before picking up a probe.", "<strong>The DVOM confirms what the scan tool suspects</strong> — it's not for random poking."]}];
const QS=[{"text": "On a post-ECM starting circuit, the starter relay coil is grounded by:", "choices": ["The ignition switch directly — same as pre-ECM", "The park/neutral position switch completing the circuit to ground", "The ECM, after verifying all required starting conditions are met", "Battery voltage applied directly to the relay coil terminal"], "correct": 2, "explanation": "The ECM controls the relay coil ground path. The ignition switch sends a request signal, but the ECM decides whether to complete the circuit. If it doesn't see park/neutral, key authentication, and other required inputs — it won't ground the relay coil."}, {"text": "A no-crank vehicle's scan tool shows the starter signal PID reads OFF with the key held in START. What does this tell the technician?", "choices": ["The ECM has failed and needs replacement", "The starter motor is internally shorted", "The starter request signal never reached the ECM — fault is before the ECM in the signal path", "The battery cables have excessive voltage drop"], "correct": 2, "explanation": "The starter signal PID shows what the ECM sees. If it reads OFF with the key in START, the ECM is not receiving the request — fault is between the ignition switch and the ECM input. Check the ignition switch, fuse, and wiring before suspecting the ECM."}, {"text": "Technician A says on a modern vehicle you should check scan tool data before using a DVOM on a no-crank. Technician B says the DVOM is always the first tool. Who is correct?", "choices": ["Technician A — scan tool data splits the diagnosis instantly", "Technician B — DVOM readings are more accurate than scan tool data", "Both A and B — use both tools simultaneously", "Neither — a carbon pile tester should always be first"], "correct": 0, "explanation": "Technician A is correct. Scan tool data tells you immediately whether the ECM received the crank request, what the PNP switch reports, whether security is blocking the start, and if any DTCs are stored — before you touch a single wire."}];
const TOT=SL.length+QS.length;
let cur=0,ans=new Array(QS.length).fill(false);
const LT=['A','B','C','D'];

function prog(n){
  const p=Math.round(n/TOT*100);
  document.getElementById('prog-bar').style.width=p+'%';
  document.getElementById('prog-lbl').textContent='Progress — '+p+'%';
}
function go(d){cur+=d;if(cur<0)cur=0;if(cur>=TOT)return;render();}
function render(){
  const el=document.getElementById('content');
  const isS=cur<SL.length;
  document.getElementById('back-btn').disabled=(cur===0);
  document.getElementById('next-btn').disabled=false;
  document.getElementById('next-btn').classList.remove('locked');
  if(cur>=TOT){prog(TOT);el.innerHTML='';showDone(el);document.getElementById('nav').style.display='none';return;}
  prog(cur);
  document.getElementById('nav').style.display='flex';
  if(isS){
    document.getElementById('step-ind').textContent='Slide '+(cur+1)+' of '+SL.length;
    renderS(SL[cur],el);
  }else{
    const qi=cur-SL.length;
    document.getElementById('step-ind').textContent='Question '+(qi+1)+' of '+QS.length;
    if(!ans[qi]){document.getElementById('next-btn').classList.add('locked');document.getElementById('next-btn').disabled=true;}
    renderQ(qi,QS[qi],el);
  }
}
function renderS(s,el){
  const body=s.body.map(b=>'<p>'+b+'</p>').join('');
  el.innerHTML='<div class="slide active"><span class="slide-icon">'+s.icon+'</span><h2>'+s.heading+'</h2>'+(s.svg?'<div class="slide-svg">'+s.svg+'</div>':'')+'<div class="slide-body">'+body+'</div></div>';
}
function renderQ(qi,q,el){
  const ch=q.choices.map((c,i)=>'<li><button class="ch-btn" onclick="pick('+qi+','+i+',this)" id="c'+qi+'_'+i+'"><span class="letter">'+LT[i]+'</span><span>'+c+'</span></button></li>').join('');
  el.innerHTML='<div class="quiz active"><div class="quiz-lbl">Knowledge Check · Question '+(qi+1)+' of '+QS.length+'</div><h2>'+q.text+'</h2><ul class="choices">'+ch+'</ul><div class="feedback" id="fb'+qi+'"></div></div>';
  if(ans[qi])restoreQ(qi,q);
}
function pick(qi,ch,btn){
  if(ans[qi])return;
  ans[qi]=true;
  const q=QS[qi],ok=q.correct;
  document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===ok)b.classList.add(ch===ok?'correct':'revealed');});
  if(ch!==ok)btn.classList.add('wrong');
  const fb=document.getElementById('fb'+qi);
  fb.className='feedback '+(ch===ok?'correct':'wrong');
  fb.innerHTML='<strong>'+(ch===ok?'✓ Correct!':'✗ Not quite.')+'</strong>'+q.explanation;
  document.getElementById('next-btn').classList.remove('locked');
  document.getElementById('next-btn').disabled=false;
  if(qi===QS.length-1)document.getElementById('next-btn').textContent='Finish →';
}
function restoreQ(qi,q){
  document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('revealed');});
  const fb=document.getElementById('fb'+qi);
  if(fb){fb.className='feedback correct';fb.innerHTML='<strong>Already answered.</strong>';}
}
function showDone(el){
  el.innerHTML='<div id="complete"><span class="ck">✅</span><h3>Lesson Complete</h3><p>All slides and knowledge check questions finished.</p><button class="restart" onclick="restart()">&#8635; Restart Lesson</button></div>';
}
function restart(){cur=0;ans=new Array(QS.length).fill(false);document.getElementById('next-btn').textContent='Next →';document.getElementById('nav').style.display='flex';render();}
render();
</script>
</body>
</html>
