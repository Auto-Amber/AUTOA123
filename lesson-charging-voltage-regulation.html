<!DOCTYPE html>
<html lang="en">
<head>

<title>Charging Systems — Voltage Regulation</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#2a9d8f;--teal-bg:#f0faf8;--teal-dk:#0d2b28;--amber:#e9a825;--amber-bg:#fffbf0;--dark:#1a1a1a;--muted:#555555;--lgray:#f5f5f5;--white:#fff;--red:#cc0000;}
html,body{height:100%;font-family:"Source Sans 3",Arial,sans-serif;background:var(--dark);color:var(--dark);font-size:15px;line-height:1.5}
#shell{display:flex;flex-direction:column;min-height:100vh;max-width:780px;margin:0 auto;background:var(--white)}
header{background:var(--dark);border-top:5px solid var(--teal);padding:12px 20px 10px}
.course-label{color:var(--teal);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
header h1{font-family:"Oswald",Arial,sans-serif;font-size:17px;color:#fff;font-weight:700;margin-bottom:1px;line-height:1.2}
header .sub{color:#aaa;font-size:11.5px}
#prog-wrap{background:#2a2a2a;border-bottom:1px solid #333;padding:8px 20px 7px}
#prog-lbl{color:#aaa;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
#prog-track{background:#3a3a3a;border-radius:4px;height:6px;overflow:hidden}
#prog-bar{background:var(--amber);height:100%;border-radius:4px;width:0%;transition:width .35s ease}
#content{flex:1;padding:16px 18px 12px;overflow-y:auto}
.slide,.quiz{display:none;animation:fi .25s ease}
.slide.active,.quiz.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.slide-icon{font-size:26px;display:block;margin-bottom:5px}
.slide h2{font-family:"Oswald",Arial,sans-serif;font-size:18px;font-weight:700;color:var(--teal);margin-bottom:8px;line-height:1.2}
.slide-svg{width:100%;margin:6px 0 10px;display:block}
.slide-body{background:var(--lgray);border-left:4px solid var(--teal);border-radius:0 7px 7px 0;padding:11px 14px;font-size:13.5px;line-height:1.6}
.slide-body p{margin-bottom:6px}.slide-body p:last-child{margin-bottom:0}
.quiz-lbl{color:var(--teal);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.quiz h2{font-size:14.5px;font-weight:700;color:var(--dark);margin-bottom:12px;line-height:1.45}
.choices{list-style:none;display:flex;flex-direction:column;gap:7px}
.ch-btn{display:flex;align-items:flex-start;gap:9px;background:#fff;border:2px solid #d0d0d0;border-radius:7px;padding:9px 12px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;font-size:13.5px;line-height:1.45;color:var(--dark);text-align:left;transition:border-color .15s,background .15s;width:100%}
.ch-btn:hover:not(:disabled){border-color:var(--teal);background:var(--teal-bg)}
.letter{flex-shrink:0;background:#e8e8e8;color:var(--muted);font-weight:700;font-size:11.5px;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background .15s,color .15s}
.ch-btn.correct{border-color:var(--teal);background:var(--teal-bg)}.ch-btn.correct .letter{background:var(--teal);color:#fff}
.ch-btn.wrong{border-color:var(--red);background:#fff5f5}.ch-btn.wrong .letter{background:var(--red);color:#fff}
.ch-btn.revealed{border-color:var(--teal);background:var(--teal-bg);opacity:.6}.ch-btn.revealed .letter{background:var(--teal);color:#fff}
.ch-btn:disabled{cursor:default}
.feedback{display:none;margin-top:10px;padding:11px 13px;border-radius:7px;font-size:13px;line-height:1.5}
.feedback.correct{display:block;background:var(--teal-bg);border-left:4px solid var(--teal)}
.feedback.wrong{display:block;background:#fff5f5;border-left:4px solid var(--red)}
.feedback strong{display:block;margin-bottom:2px}
#complete{display:none;background:var(--teal-dk);border:2px solid var(--teal);border-radius:10px;padding:20px;text-align:center;animation:fi .4s ease}
#complete .ck{font-size:34px;margin-bottom:5px;display:block}
#complete h3{font-family:"Oswald",Arial,sans-serif;font-size:19px;color:var(--teal);margin-bottom:3px}
#complete p{color:#ccc;font-size:12.5px;margin-bottom:12px}
.restart{display:inline-block;background:transparent;color:var(--teal);border:1.5px solid var(--teal);padding:6px 16px;border-radius:5px;font-size:12.5px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s,color .15s}
.restart:hover{background:var(--teal);color:#fff}
#nav{background:#f5f5f5;border-top:2px solid var(--teal);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
#step-ind{font-size:11.5px;color:var(--muted);text-align:center;flex:1}
.nbtn{background:var(--dark);color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s;min-width:74px}
.nbtn:hover{background:var(--teal)}.nbtn:disabled,.nbtn.locked{background:#ccc;color:#888;cursor:default}
</style>
</head>

</div>

</div>
</div>
<script>
const SL=[
{
  "heading":"What the Alternator Does",
  "icon":"⚡",
  "svg":"<svg viewBox=\"0 0 700 190\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"16\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ENERGY CONVERSION — WHAT THE ALTERNATOR DOES</text><rect x=\"40\" y=\"35\" width=\"130\" height=\"60\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"6\"/><text x=\"105\" y=\"60\" font-size=\"11\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ENGINE</text><text x=\"105\" y=\"76\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Mechanical</text><text x=\"105\" y=\"88\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">rotation (RPM)</text><line x1=\"170\" y1=\"65\" x2=\"230\" y2=\"65\" stroke=\"#2a9d8f\" stroke-width=\"3\" marker-end=\"url(#arr)\"/><text x=\"200\" y=\"58\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">drive belt</text><rect x=\"230\" y=\"35\" width=\"130\" height=\"60\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" rx=\"6\"/><text x=\"295\" y=\"58\" font-size=\"11\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ALTERNATOR</text><text x=\"295\" y=\"73\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Converts</text><text x=\"295\" y=\"85\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">mechanical → AC</text><line x1=\"360\" y1=\"65\" x2=\"420\" y2=\"65\" stroke=\"#2a9d8f\" stroke-width=\"3\"/><rect x=\"360\" y=\"50\" width=\"60\" height=\"30\" fill=\"#1a1a1a\" stroke=\"#2a9d8f\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"390\" y=\"63\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">RECTIFIER</text><text x=\"390\" y=\"74\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">AC → DC</text><line x1=\"420\" y1=\"65\" x2=\"480\" y2=\"65\" stroke=\"#e9a825\" stroke-width=\"3\"/><rect x=\"480\" y=\"35\" width=\"130\" height=\"60\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"6\"/><text x=\"545\" y=\"58\" font-size=\"11\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">BATTERY +</text><text x=\"545\" y=\"73\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">DC current</text><text x=\"545\" y=\"85\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">charges battery</text><rect x=\"40\" y=\"120\" width=\"620\" height=\"55\" fill=\"#f5f5f5\" stroke=\"#d0d0d0\" stroke-width=\"1\" rx=\"6\"/><text x=\"350\" y=\"138\" font-size=\"10\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Two jobs running at the same time:</text><text x=\"200\" y=\"155\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">① Keep the battery charged</text><text x=\"500\" y=\"155\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">② Power all vehicle electrical loads</text><defs><marker id=\"arr\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#2a9d8f\"/></marker></defs></svg>",
const SL=[{"heading": "Traditional Voltage Regulation", "icon": "🔌", "svg": "<svg viewBox=\"0 0 700 190\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"15\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">TRADITIONAL VOLTAGE REGULATION — ZENER DIODE CONTROL</text><rect x=\"20\" y=\"35\" width=\"90\" height=\"36\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"5\"/><text x=\"65\" y=\"51\" font-size=\"10\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">BATTERY</text><text x=\"65\" y=\"63\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">+12–14V</text><line x1=\"110\" y1=\"53\" x2=\"150\" y2=\"53\" stroke=\"#2a9d8f\" stroke-width=\"2\"/><rect x=\"150\" y=\"35\" width=\"120\" height=\"36\" fill=\"#1a1a1a\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"5\"/><text x=\"210\" y=\"51\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ZENER DIODE</text><text x=\"210\" y=\"63\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">blocks until set point</text><line x1=\"270\" y1=\"53\" x2=\"310\" y2=\"53\" stroke=\"#2a9d8f\" stroke-width=\"2\"/><rect x=\"310\" y=\"35\" width=\"110\" height=\"36\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"5\"/><text x=\"365\" y=\"51\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">FIELD CIRCUIT</text><text x=\"365\" y=\"63\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">opens when Zener conducts</text><line x1=\"420\" y1=\"53\" x2=\"460\" y2=\"53\" stroke=\"#e9a825\" stroke-width=\"2\"/><rect x=\"460\" y=\"35\" width=\"110\" height=\"36\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"5\"/><text x=\"515\" y=\"51\" font-size=\"10\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">OUTPUT DROPS</text><text x=\"515\" y=\"63\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">voltage falls → field closes</text><rect x=\"20\" y=\"95\" width=\"300\" height=\"82\" fill=\"#f5f5f5\" stroke=\"#555555\" stroke-width=\"1\" rx=\"6\"/><text x=\"170\" y=\"112\" font-size=\"10\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">TRADITIONAL — WHAT TO KNOW</text><text x=\"170\" y=\"128\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Regulator controls GROUND side of field circuit</text><text x=\"170\" y=\"142\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Self-contained — usually in rectifier assembly</text><text x=\"170\" y=\"156\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Normal output: 13.5–14.5V</text><text x=\"170\" y=\"170\" font-size=\"8.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Overcharge: check alternator GROUND first</text><rect x=\"340\" y=\"95\" width=\"340\" height=\"82\" fill=\"#0d2b28\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"6\"/><text x=\"510\" y=\"112\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ECM-CONTROLLED — WHAT TO KNOW</text><text x=\"510\" y=\"128\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">ECM sends PWM/LIN signal to alternator</text><text x=\"510\" y=\"142\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">12.5V idle = NORMAL in eco mode</text><text x=\"510\" y=\"156\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Check scan tool FIRST — P0622, P0625</text><text x=\"510\" y=\"170\" font-size=\"8.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Most vehicles built after ~2005</text></svg>", "body": ["The voltage regulator controls output by varying <strong>field current</strong> — the current through the rotor winding. More field current = stronger magnetic field = more alternator output.", "In a traditional (non-ECM) regulator, a <strong>Zener diode</strong> is the key component. It blocks current until voltage reaches the set point, then conducts — opening the field circuit and reducing output. This switching happens many times per second.", "Most traditional regulators control the <strong>ground side</strong> of the field circuit. They are usually integrated into the rectifier assembly inside the alternator.", "<strong>Overcharge (above 15V) first check:</strong> Always measure voltage drop from the alternator case to battery negative before condemning the regulator. A bad ground is the most common cause of overcharge."]}, {"heading": "ECM-Controlled Charging — Three Modes", "icon": "🖥️", "svg": "<svg viewBox=\"0 0 700 185\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"15\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ECM SMART CHARGING — THREE OPERATING MODES</text><rect x=\"15\" y=\"28\" width=\"210\" height=\"145\" fill=\"#0d2b28\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"7\"/><text x=\"120\" y=\"46\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">BATTERY CHARGE MODE</text><text x=\"120\" y=\"62\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">When: cold start, heavy load</text><text x=\"120\" y=\"76\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Field duty: HIGH (~95%+)</text><text x=\"120\" y=\"90\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Output: full rated amperage</text><rect x=\"120\" y=\"100\" width=\"80\" height=\"22\" fill=\"#2a9d8f\" rx=\"4\"/><text x=\"160\" y=\"115\" font-size=\"9\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">~14.0–14.5V</text><text x=\"120\" y=\"138\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Goal: restore</text><text x=\"120\" y=\"150\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">battery SOC</text><rect x=\"245\" y=\"28\" width=\"210\" height=\"145\" fill=\"#1a1200\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"7\"/><text x=\"350\" y=\"46\" font-size=\"10\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">VOLTAGE REDUCTION MODE</text><text x=\"350\" y=\"60\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">(Fuel Economy)</text><text x=\"350\" y=\"76\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">When: light cruise, acceleration</text><text x=\"350\" y=\"90\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Field duty: LOW (~10–30%)</text><text x=\"350\" y=\"104\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Output: 12.5–13.0V</text><text x=\"350\" y=\"122\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Reduces belt drag on engine</text><text x=\"350\" y=\"136\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">SOC algorithm tracks</text><text x=\"350\" y=\"148\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">slight battery discharge</text><text x=\"350\" y=\"162\" font-size=\"8.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">NOT an undercharge fault</text><rect x=\"475\" y=\"28\" width=\"210\" height=\"145\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"7\"/><text x=\"580\" y=\"46\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">NORMAL REGULATION</text><text x=\"580\" y=\"62\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">When: normal driving</text><text x=\"580\" y=\"76\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Field duty: modulated</text><text x=\"580\" y=\"90\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Based on: SOC sensor,</text><text x=\"580\" y=\"104\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">temperature, electrical loads</text><rect x=\"530\" y=\"114\" width=\"100\" height=\"22\" fill=\"#2a9d8f\" rx=\"4\"/><text x=\"580\" y=\"129\" font-size=\"9\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">~14.0–14.5V</text><text x=\"580\" y=\"154\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Maintains battery SOC</text><text x=\"580\" y=\"166\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">while managing fuel economy</text></svg>", "body": ["On most vehicles built after approximately 2005, the <strong>ECM/PCM controls the alternator</strong> via a PWM or LIN bus signal — not a standalone internal regulator.", "<strong>Battery Charge Mode:</strong> After cold start or heavy load. ECM commands maximum field duty cycle. Full output to restore battery SOC.", "<strong>Voltage Reduction Mode (eco):</strong> During light cruise. ECM reduces field current — output drops to 12.5–13.0V. Reduces belt drag on engine = fuel savings. The SOC algorithm tracks the small battery discharge.", "<strong>Normal Regulation Mode:</strong> ECM modulates field duty cycle based on battery SOC sensor, temperature, and electrical loads to maintain ~14.0–14.5V."]}, {"heading": "Scan Tool First — Key PIDs", "icon": "🔍", "svg": "<svg viewBox=\"0 0 700 185\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"15\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">SCAN TOOL PIDs — WHAT TO CHECK FIRST</text><rect x=\"20\" y=\"28\" width=\"305\" height=\"150\" fill=\"#1a1a1a\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"7\"/><text x=\"172\" y=\"46\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">KEY PIDs TO CHECK</text><text x=\"172\" y=\"64\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Alternator Command (%)</text><text x=\"172\" y=\"78\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Is ECM asking for high output? If yes and voltage is low → alternator fault</text><text x=\"172\" y=\"96\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Field Duty Cycle (%)</text><text x=\"172\" y=\"110\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Low % = eco mode (normal). High % with low voltage = alternator not responding</text><text x=\"172\" y=\"128\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Target Charging Voltage</text><text x=\"172\" y=\"142\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">What voltage is the ECM requesting?</text><text x=\"172\" y=\"160\" font-size=\"8.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Also check for P0622, P0625, P0626 DTCs</text><rect x=\"345\" y=\"28\" width=\"335\" height=\"150\" fill=\"#f5f5f5\" stroke=\"#555555\" stroke-width=\"1\" rx=\"7\"/><text x=\"512\" y=\"46\" font-size=\"10\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">INTERPRETING PID DATA</text><rect x=\"360\" y=\"56\" width=\"305\" height=\"32\" fill=\"#0d2b28\" stroke=\"#2a9d8f\" stroke-width=\"1\" rx=\"4\"/><text x=\"512\" y=\"70\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">High duty cycle + low voltage</text><text x=\"512\" y=\"82\" font-size=\"8.5\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">ECM is commanding output — alternator not responding</text><rect x=\"360\" y=\"96\" width=\"305\" height=\"32\" fill=\"#1a1200\" stroke=\"#e9a825\" stroke-width=\"1\" rx=\"4\"/><text x=\"512\" y=\"110\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Low duty cycle + low voltage</text><text x=\"512\" y=\"122\" font-size=\"8.5\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">ECM is in eco mode — this is NORMAL, not a fault</text><rect x=\"360\" y=\"136\" width=\"305\" height=\"32\" fill=\"#200000\" stroke=\"#cc0000\" stroke-width=\"1\" rx=\"4\"/><text x=\"512\" y=\"150\" font-size=\"9\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">High duty cycle + high voltage (&gt;15V)</text><text x=\"512\" y=\"162\" font-size=\"8.5\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Overcharge — check alternator ground first</text></svg>", "body": ["On ECM-controlled vehicles, <strong>always check scan tool data before any other test</strong>. It tells you whether the ECM is intentionally commanding low output (normal) or commanding high output and not getting it (fault).", "<strong>Key PIDs:</strong> Alternator Command (%), Field Duty Cycle (%), Target Charging Voltage, Battery Current Sensor. Also check for DTCs: P0622 (field control circuit), P0625/P0626 (field low/high).", "<strong>Interpreting results:</strong> High duty cycle + low voltage = ECM commanding output but alternator not responding → alternator or wiring fault. Low duty cycle + low voltage = eco mode → normal, not a fault.", "A carbon pile output test alone cannot tell you whether low output is intentional (eco mode) or a failure. Scan tool data first is always the correct approach on modern vehicles."]}];
const QS=[{"text": "Technician A says overcharge (above 15V) always means the voltage regulator has failed and the alternator needs to be replaced. Technician B says to check the alternator ground connection first. Who is correct?", "choices": ["Technician A only", "Technician B only", "Both Technician A and Technician B", "Neither technician"], "correct": 1, "explanation": "Technician B is correct. A loose or corroded alternator case-to-chassis ground is the most common cause of overcharge. Without a proper ground, the voltage regulator loses its reference point and the alternator runs unregulated at maximum output. Always measure voltage drop from alternator case to battery negative (spec: under 0.2V) before condemning the regulator or alternator. Replacing the alternator without fixing the ground will not solve the problem."}, {"text": "With the engine at idle on a 2020 Ford F-150, a technician reads 12.7V at the battery. The scan tool shows Field Duty Cycle at 18%. What is the most likely explanation?", "choices": ["The alternator is failing — 12.7V is below minimum specification", "The voltage regulator is stuck in low output mode", "The ECM is in Voltage Reduction (fuel economy) mode — this is normal", "The battery is overcharged and must be replaced"], "correct": 2, "explanation": "A Field Duty Cycle of 18% means the ECM is intentionally commanding low alternator output — this is Voltage Reduction (fuel economy) mode. 12.7V at idle is completely normal in this mode. The ECM reduces belt drag on the engine during low-demand conditions to improve fuel economy. No fault exists. This is the scenario that results in misdiagnosis when a technician skips the scan tool and jumps straight to the alternator test."}, {"text": "What does the Zener diode do in a traditional (non-ECM) voltage regulator?", "choices": ["It rectifies AC current from the stator into DC current", "It blocks current flow until voltage reaches the regulator set point, then triggers the field circuit to open", "It stores electrical energy when the alternator is not needed", "It monitors battery SOC and adjusts output accordingly"], "correct": 1, "explanation": "The Zener diode in a traditional regulator blocks current flow until the voltage reaches the set point (typically 14.2–14.6V). When voltage rises to that level, the Zener conducts — this triggers the transistor circuit to open the field coil ground path, cutting field current, weakening the magnetic field, and reducing output. When voltage drops below the set point, the Zener stops conducting, the field circuit closes, and output rises again. This rapid switching maintains voltage in a narrow band."}];

  "heading":"What the Alternator Does",
  "icon":"⚡",
  "svg":"<svg viewBox=\"0 0 700 190\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"16\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ENERGY CONVERSION — WHAT THE ALTERNATOR DOES</text><rect x=\"40\" y=\"35\" width=\"130\" height=\"60\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"6\"/><text x=\"105\" y=\"60\" font-size=\"11\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ENGINE</text><text x=\"105\" y=\"76\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Mechanical</text><text x=\"105\" y=\"88\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">rotation (RPM)</text><line x1=\"170\" y1=\"65\" x2=\"230\" y2=\"65\" stroke=\"#2a9d8f\" stroke-width=\"3\" marker-end=\"url(#arr)\"/><text x=\"200\" y=\"58\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">drive belt</text><rect x=\"230\" y=\"35\" width=\"130\" height=\"60\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" rx=\"6\"/><text x=\"295\" y=\"58\" font-size=\"11\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ALTERNATOR</text><text x=\"295\" y=\"73\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Converts</text><text x=\"295\" y=\"85\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">mechanical → AC</text><line x1=\"360\" y1=\"65\" x2=\"420\" y2=\"65\" stroke=\"#2a9d8f\" stroke-width=\"3\"/><rect x=\"360\" y=\"50\" width=\"60\" height=\"30\" fill=\"#1a1a1a\" stroke=\"#2a9d8f\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"390\" y=\"63\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">RECTIFIER</text><text x=\"390\" y=\"74\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">AC → DC</text><line x1=\"420\" y1=\"65\" x2=\"480\" y2=\"65\" stroke=\"#e9a825\" stroke-width=\"3\"/><rect x=\"480\" y=\"35\" width=\"130\" height=\"60\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"6\"/><text x=\"545\" y=\"58\" font-size=\"11\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">BATTERY +</text><text x=\"545\" y=\"73\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">DC current</text><text x=\"545\" y=\"85\" font-size=\"10\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">charges battery</text><rect x=\"40\" y=\"120\" width=\"620\" height=\"55\" fill=\"#f5f5f5\" stroke=\"#d0d0d0\" stroke-width=\"1\" rx=\"6\"/><text x=\"350\" y=\"138\" font-size=\"10\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Two jobs running at the same time:</text><text x=\"200\" y=\"155\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">① Keep the battery charged</text><text x=\"500\" y=\"155\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">② Power all vehicle electrical loads</text><defs><marker id=\"arr\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L0,6 L8,3 z\" fill=\"#2a9d8f\"/></marker></defs></svg>",
  "body":["The alternator converts <strong>mechanical rotation</strong> (from the engine via the drive belt) into <strong>DC electrical energy</strong>. It does NOT store energy — that is the battery's job.","The SAE technical term is <strong>generator</strong>. The industry and shop floor term is <strong>alternator</strong>. Both refer to the same component.","The alternator runs at approximately <strong>2–3× engine speed</strong> because the alternator pulley is smaller than the crankshaft pulley. At 2,000 engine RPM the alternator may spin at 4,000–6,000 RPM.","Normal charging voltage: <strong>13.5–14.5V DC</strong>. Below = undercharge. Above = overcharge."]
},

  "heading":"Rotor, Stator & Diodes",
  "icon":"🔩",
  "svg":"<svg viewBox=\"0 0 700 200\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"15\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ALTERNATOR ANATOMY — KEY COMPONENTS</text><rect x=\"20\" y=\"28\" width=\"145\" height=\"155\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"6\"/><text x=\"92\" y=\"46\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ROTOR</text><text x=\"92\" y=\"60\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Rotating component</text><circle cx=\"92\" cy=\"105\" r=\"38\" fill=\"#e8f7f5\" stroke=\"#2a9d8f\" stroke-width=\"2\"/><text x=\"92\" y=\"100\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Field</text><text x=\"92\" y=\"112\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">winding</text><text x=\"92\" y=\"162\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Creates rotating</text><text x=\"92\" y=\"174\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">magnetic field</text><rect x=\"185\" y=\"28\" width=\"145\" height=\"155\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"6\"/><text x=\"257\" y=\"46\" font-size=\"10\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">STATOR</text><text x=\"257\" y=\"60\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Stationary windings</text><rect x=\"205\" y=\"70\" width=\"105\" height=\"72\" fill=\"#ffffff\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"257\" y=\"92\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">3-phase AC</text><text x=\"257\" y=\"106\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Three winding sets</text><text x=\"257\" y=\"118\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">offset 120° apart</text><text x=\"257\" y=\"132\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Smoother output</text><text x=\"257\" y=\"162\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Current induced as</text><text x=\"257\" y=\"174\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">rotor field passes</text><rect x=\"350\" y=\"28\" width=\"145\" height=\"155\" fill=\"#f5f5f5\" stroke=\"#555555\" stroke-width=\"2\" rx=\"6\"/><text x=\"422\" y=\"46\" font-size=\"10\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">RECTIFIER</text><text x=\"422\" y=\"60\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">6 diodes — AC → DC</text><rect x=\"370\" y=\"70\" width=\"105\" height=\"72\" fill=\"#ffffff\" stroke=\"#555555\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"422\" y=\"92\" font-size=\"9\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">One-way valve</text><text x=\"422\" y=\"106\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">3 positive diodes</text><text x=\"422\" y=\"118\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">3 negative diodes</text><text x=\"422\" y=\"132\" font-size=\"8.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Failed diode</text><text x=\"422\" y=\"143\" font-size=\"8.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">= AC ripple in output</text><text x=\"422\" y=\"162\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Also houses</text><text x=\"422\" y=\"174\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">voltage regulator</text><rect x=\"515\" y=\"28\" width=\"165\" height=\"155\" fill=\"#1a1a1a\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"6\"/><text x=\"597\" y=\"46\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">OUTPUT FACTORS</text><text x=\"597\" y=\"64\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">To increase output:</text><text x=\"597\" y=\"80\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">↑ Rotor speed (RPM)</text><text x=\"597\" y=\"95\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">↑ Stator windings</text><text x=\"597\" y=\"110\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">↑ Field strength</text><line x1=\"535\" y1=\"122\" x2=\"675\" y2=\"122\" stroke=\"#2a9d8f\" stroke-width=\"0.8\"/><text x=\"597\" y=\"138\" font-size=\"9\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Alternator runs</text><text x=\"597\" y=\"152\" font-size=\"9\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">2–3× engine RPM</text><text x=\"597\" y=\"167\" font-size=\"9\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">via smaller pulley</text></svg>",
  "body":["The <strong>rotor</strong> is the rotating component driven by the belt. Its field winding creates a rotating magnetic field. Slip rings on the shaft deliver field current from stationary brushes.","The <strong>stator</strong> is stationary inside the housing. As the rotor's magnetic field sweeps past its three winding sets, current is induced — producing 3-phase AC.","The <strong>rectifier</strong> contains 6 diodes (3 positive, 3 negative) that convert 3-phase AC to DC. A failed diode allows AC to bleed into the DC output — this is called <strong>AC ripple</strong> and is detectable with a DVOM or PicoScope.","<strong>Wye vs Delta:</strong> Wye is the most common stator winding — one end of each winding connects to a common neutral point. Delta connects windings in a triangle and is used on high-output alternators."]
},

  "heading":"Voltage Regulation & Slip Rings",
  "icon":"🎛️",
  "svg":"<svg viewBox=\"0 0 700 190\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"15\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">HOW OUTPUT IS CONTROLLED — FIELD CURRENT PATH</text><rect x=\"20\" y=\"30\" width=\"90\" height=\"40\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"5\"/><text x=\"65\" y=\"48\" font-size=\"10\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">BATTERY</text><text x=\"65\" y=\"61\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">+12V supply</text><line x1=\"110\" y1=\"50\" x2=\"150\" y2=\"50\" stroke=\"#2a9d8f\" stroke-width=\"2\"/><rect x=\"150\" y=\"30\" width=\"110\" height=\"40\" fill=\"#1a1a1a\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"5\"/><text x=\"205\" y=\"48\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">REGULATOR</text><text x=\"205\" y=\"61\" font-size=\"8.5\" fill=\"#aaaaaa\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">controls field current</text><line x1=\"260\" y1=\"50\" x2=\"300\" y2=\"50\" stroke=\"#2a9d8f\" stroke-width=\"2\"/><rect x=\"300\" y=\"30\" width=\"100\" height=\"40\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"5\"/><text x=\"350\" y=\"48\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">BRUSH</text><text x=\"350\" y=\"61\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">presses on slip ring</text><line x1=\"400\" y1=\"50\" x2=\"440\" y2=\"50\" stroke=\"#2a9d8f\" stroke-width=\"2\"/><rect x=\"440\" y=\"30\" width=\"100\" height=\"40\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"5\"/><text x=\"490\" y=\"48\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ROTOR</text><text x=\"490\" y=\"61\" font-size=\"8.5\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">field winding</text><line x1=\"540\" y1=\"50\" x2=\"580\" y2=\"50\" stroke=\"#e9a825\" stroke-width=\"2\"/><rect x=\"580\" y=\"30\" width=\"100\" height=\"40\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"5\"/><text x=\"630\" y=\"48\" font-size=\"10\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">OUTPUT ↑</text><text x=\"630\" y=\"61\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">more field = more V</text><rect x=\"20\" y=\"95\" width=\"310\" height=\"80\" fill=\"#f5f5f5\" stroke=\"#555555\" stroke-width=\"1\" rx=\"6\"/><text x=\"175\" y=\"112\" font-size=\"10\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">TRADITIONAL REGULATOR</text><text x=\"175\" y=\"128\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Zener diode opens field circuit</text><text x=\"175\" y=\"141\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">when voltage reaches set point</text><text x=\"175\" y=\"155\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Self-contained in rectifier assembly</text><text x=\"175\" y=\"168\" font-size=\"8.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Older vehicles / some current designs</text><rect x=\"360\" y=\"95\" width=\"320\" height=\"80\" fill=\"#0d2b28\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"6\"/><text x=\"520\" y=\"112\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">ECM-CONTROLLED (SMART CHARGING)</text><text x=\"520\" y=\"128\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">ECM/PCM varies field duty cycle</text><text x=\"520\" y=\"141\" font-size=\"9\" fill=\"#cccccc\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">via PWM or LIN bus signal</text><text x=\"520\" y=\"155\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">12.5V at idle = NORMAL in eco mode</text><text x=\"520\" y=\"168\" font-size=\"8.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-family=\"Arial,sans-serif\">Most vehicles built after ~2005</text></svg>",
  "body":["The voltage regulator controls alternator output by varying <strong>field current</strong> — the current flowing through the rotor winding. More field current = stronger magnetic field = more output voltage and amperage.","<strong>Traditional regulator:</strong> A Zener diode opens the field circuit when voltage reaches the set point. Output drops. Voltage falls. Field closes. Repeats rapidly to hold voltage in a narrow band.","<strong>ECM-controlled (smart charging):</strong> The ECM/PCM sends a PWM or LIN bus signal to control the field duty cycle. Three modes: Battery Charge Mode (full output), Voltage Reduction Mode (eco — may show 12.5V at idle), and Normal Regulation Mode.","<strong>Critical diagnostic note:</strong> On smart-charging vehicles, 12.5V at idle is NORMAL in fuel economy mode. Always check scan tool PIDs (Alternator Command, Field Duty Cycle) before condemning the alternator."]
}
];
const QS=[
{
  "text":"An alternator converts which type of energy into which type?",
  "choices":["DC electrical energy into mechanical energy","Mechanical energy into DC electrical energy","Chemical energy into electrical energy","AC electrical energy into DC without moving parts"],
  "correct":1,
  "explanation":"The alternator converts mechanical rotation (from the engine via the drive belt) into DC electrical energy. The rectifier diodes handle the AC-to-DC conversion internally, but the primary energy conversion is mechanical to electrical. The battery handles chemical-to-electrical conversion."
},
{
  "text":"A student says the stator is the rotating part of the alternator that creates the magnetic field. Is the student correct?",
  "choices":["Yes — the stator rotates inside the housing","No — the rotor rotates and creates the magnetic field; the stator is stationary","Yes — the stator contains the field winding on slip rings","No — neither part rotates; electromagnetic induction works without movement"],
  "correct":1,
  "explanation":"The student has it backwards. The ROTOR is the rotating component — it contains the field winding and creates the rotating magnetic field via current through the slip rings. The STATOR is stationary inside the housing. As the rotor field sweeps past the stator windings, current is induced in the stator — producing 3-phase AC output."
},
{
  "text":"On a 2018 Toyota Camry with the engine at idle, the DVOM reads 12.8V at the battery. Before diagnosing an undercharge condition, what should the technician check first?",
  "choices":["Replace the voltage regulator — 12.8V is below the 13.5V minimum","Perform a carbon pile output test immediately","Connect a scan tool and check the Alternator Command or Field Duty Cycle PID","Replace the alternator — output is clearly too low"],
  "correct":2,
  "explanation":"On ECM-controlled vehicles (most post-2005), 12.8V at idle may be completely normal in Voltage Reduction (fuel economy) mode. The ECM intentionally reduces field current at idle to reduce belt load and improve fuel economy. Before any other test, check the scan tool — if the Alternator Command PID shows low duty cycle, the system is working as designed. Condemning the alternator without this step is a very common and costly misdiagnosis."
}
];
const TOT=SL.length+QS.length;
let cur=0,ans=new Array(QS.length).fill(false);
const LT=['A','B','C','D'];
function prog(n){const p=Math.round(n/TOT*100);document.getElementById('prog-bar').style.width=p+'%';document.getElementById('prog-lbl').textContent='Progress — '+p+'%';}
function go(d){cur+=d;if(cur<0)cur=0;if(cur>=TOT)return;render();}
function render(){
  const el=document.getElementById('content');
  const isS=cur<SL.length;
  document.getElementById('back-btn').disabled=(cur===0);
  document.getElementById('next-btn').disabled=false;
  document.getElementById('next-btn').classList.remove('locked');
  if(cur>=TOT){prog(TOT);el.innerHTML='';showDone(el);document.getElementById('nav').style.display='none';return;}
  prog(cur);
  document.getElementById('nav').style.display='flex';
  if(isS){document.getElementById('step-ind').textContent='Slide '+(cur+1)+' of '+SL.length;renderS(SL[cur],el);}
  else{const qi=cur-SL.length;document.getElementById('step-ind').textContent='Question '+(qi+1)+' of '+QS.length;if(!ans[qi]){document.getElementById('next-btn').classList.add('locked');document.getElementById('next-btn').disabled=true;}renderQ(qi,QS[qi],el);}
}
function renderS(s,el){const body=s.body.map(b=>'<p>'+b+'</p>').join('');el.innerHTML='<div class="slide active"><span class="slide-icon">'+s.icon+'</span><h2>'+s.heading+'</h2>'+(s.svg?'<div class="slide-svg">'+s.svg+'</div>':'')+'<div class="slide-body">'+body+'</div></div>';}
function renderQ(qi,q,el){const ch=q.choices.map((c,i)=>'<li><button class="ch-btn" onclick="pick('+qi+','+i+',this)" id="c'+qi+'_'+i+'"><span class="letter">'+LT[i]+'</span><span>'+c+'</span></button></li>').join('');el.innerHTML='<div class="quiz active"><div class="quiz-lbl">Knowledge Check · Question '+(qi+1)+' of '+QS.length+'</div><h2>'+q.text+'</h2><ul class="choices">'+ch+'</ul><div class="feedback" id="fb'+qi+'"></div></div>';if(ans[qi])restoreQ(qi,q);}
function pick(qi,ch,btn){if(ans[qi])return;ans[qi]=true;const q=QS[qi],ok=q.correct;document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===ok)b.classList.add(ch===ok?'correct':'revealed');});if(ch!==ok)btn.classList.add('wrong');const fb=document.getElementById('fb'+qi);fb.className='feedback '+(ch===ok?'correct':'wrong');fb.innerHTML='<strong>'+(ch===ok?'✓ Correct!':'✗ Not quite.')+'</strong>'+q.explanation;document.getElementById('next-btn').classList.remove('locked');document.getElementById('next-btn').disabled=false;if(qi===QS.length-1)document.getElementById('next-btn').textContent='Finish →';}
function restoreQ(qi,q){document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('revealed');});const fb=document.getElementById('fb'+qi);if(fb){fb.className='feedback correct';fb.innerHTML='<strong>Already answered.</strong>';}}
function showDone(el){el.innerHTML='<div id="complete"><span class="ck">✅</span><h3>Lesson Complete</h3><p>All slides and knowledge check questions finished.</p><button class="restart" onclick="restart()">&#8635; Restart Lesson</button></div>';}
function restart(){cur=0;ans=new Array(QS.length).fill(false);document.getElementById('next-btn').textContent='Next →';document.getElementById('nav').style.display='flex';render();}
render();
</script>
</body>
</html>
