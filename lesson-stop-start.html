<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Stop / Start Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#2a9d8f;--teal-bg:#f0faf8;--teal-dk:#0d2b28;
  --amber:#e9a825;--amber-bg:#fffbf0;
  --dark:#1a1a1a;--muted:#555555;--lgray:#f5f5f5;--white:#fff;--red:#cc0000;
}
html,body{height:100%;font-family:"Source Sans 3",Arial,sans-serif;background:var(--dark);color:var(--dark);font-size:15px;line-height:1.5}
#shell{display:flex;flex-direction:column;min-height:100vh;max-width:780px;margin:0 auto;background:var(--white)}
header{background:var(--dark);border-top:5px solid var(--teal);padding:12px 20px 10px}
.course-label{color:var(--teal);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
header h1{font-family:"Oswald",Arial,sans-serif;font-size:17px;color:#fff;font-weight:700;margin-bottom:1px;line-height:1.2}
header .sub{color:#aaa;font-size:11.5px}
#prog-wrap{background:#2a2a2a;border-bottom:1px solid #333;padding:8px 20px 7px}
#prog-lbl{color:#aaa;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
#prog-track{background:#3a3a3a;border-radius:4px;height:6px;overflow:hidden}
#prog-bar{background:var(--amber);height:100%;border-radius:4px;width:0%;transition:width .35s ease}
#content{flex:1;padding:16px 18px 12px;overflow-y:auto}
.slide,.quiz{display:none;animation:fi .25s ease}
.slide.active,.quiz.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.slide-icon{font-size:26px;display:block;margin-bottom:5px}
.slide h2{font-family:"Oswald",Arial,sans-serif;font-size:18px;font-weight:700;color:var(--teal);margin-bottom:8px;line-height:1.2}
.slide-svg{width:100%;margin:6px 0 10px;display:block}
.slide-body{background:var(--lgray);border-left:4px solid var(--teal);border-radius:0 7px 7px 0;padding:11px 14px;font-size:13.5px;line-height:1.6}
.slide-body p{margin-bottom:6px}.slide-body p:last-child{margin-bottom:0}
.quiz-lbl{color:var(--teal);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.quiz h2{font-size:14.5px;font-weight:700;color:var(--dark);margin-bottom:12px;line-height:1.45}
.choices{list-style:none;display:flex;flex-direction:column;gap:7px}
.ch-btn{display:flex;align-items:flex-start;gap:9px;background:#fff;border:2px solid #d0d0d0;border-radius:7px;padding:9px 12px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;font-size:13.5px;line-height:1.45;color:var(--dark);text-align:left;transition:border-color .15s,background .15s;width:100%}
.ch-btn:hover:not(:disabled){border-color:var(--teal);background:var(--teal-bg)}
.letter{flex-shrink:0;background:#e8e8e8;color:var(--muted);font-weight:700;font-size:11.5px;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background .15s,color .15s}
.ch-btn.correct{border-color:var(--teal);background:var(--teal-bg)}.ch-btn.correct .letter{background:var(--teal);color:#fff}
.ch-btn.wrong{border-color:var(--red);background:#fff5f5}.ch-btn.wrong .letter{background:var(--red);color:#fff}
.ch-btn.revealed{border-color:var(--teal);background:var(--teal-bg);opacity:.6}.ch-btn.revealed .letter{background:var(--teal);color:#fff}
.ch-btn:disabled{cursor:default}
.feedback{display:none;margin-top:10px;padding:11px 13px;border-radius:7px;font-size:13px;line-height:1.5}
.feedback.correct{display:block;background:var(--teal-bg);border-left:4px solid var(--teal)}
.feedback.wrong{display:block;background:#fff5f5;border-left:4px solid var(--red)}
.feedback strong{display:block;margin-bottom:2px}
#complete{display:none;background:var(--teal-dk);border:2px solid var(--teal);border-radius:10px;padding:20px;text-align:center;animation:fi .4s ease}
#complete .ck{font-size:34px;margin-bottom:5px;display:block}
#complete h3{font-family:"Oswald",Arial,sans-serif;font-size:19px;color:var(--teal);margin-bottom:3px}
#complete p{color:#ccc;font-size:12.5px;margin-bottom:12px}
.restart{display:inline-block;background:transparent;color:var(--teal);border:1.5px solid var(--teal);padding:6px 16px;border-radius:5px;font-size:12.5px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s,color .15s}
.restart:hover{background:var(--teal);color:#fff}
#nav{background:#f5f5f5;border-top:2px solid var(--teal);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
#step-ind{font-size:11.5px;color:var(--muted);text-align:center;flex:1}
.nbtn{background:var(--dark);color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s;min-width:74px}
.nbtn:hover{background:var(--teal)}.nbtn:disabled,.nbtn.locked{background:#ccc;color:#888;cursor:default}
</style>
</head>
<body>
<div id="shell">
<header>
  <div class="course-label">AUTOA 123 · Micro Lesson</div>
  <h1>Idle Stop / Start Systems</h1>
  <div class="sub">How S-ENE Works · Inhibit Conditions · Battery Requirements · DTCs</div>
</header>
<div id="prog-wrap">
  <div id="prog-lbl">Progress</div>
  <div id="prog-track"><div id="prog-bar"></div></div>
</div>
<div id="content"></div>
<div id="nav">
  <button class="nbtn" id="back-btn" onclick="go(-1)" disabled>← Back</button>
  <div id="step-ind">—</div>
  <button class="nbtn" id="next-btn" onclick="go(1)">Next →</button>
</div>
</div>
<script>
const SL=[{"heading": "How Idle Stop / Start Works", "icon": "🔄", "svg": "<svg viewBox=\"0 0 700 215\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"14\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">IDLE STOP CONDITIONS — ALL MUST BE MET</text><rect x=\"270\" y=\"80\" width=\"160\" height=\"50\" fill=\"#0d2b28\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" rx=\"8\"/><text x=\"350\" y=\"102\" font-size=\"12\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Engine Shuts</text><text x=\"350\" y=\"116\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Down (idle stop)</text><rect x=\"10\" y=\"28\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"80\" y=\"47\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Vehicle at complete stop</text><rect x=\"10\" y=\"76\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"80\" y=\"95\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Brake pedal depressed</text><rect x=\"10\" y=\"124\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"80\" y=\"143\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Engine at operating temp</text><rect x=\"10\" y=\"172\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"80\" y=\"191\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Battery SOC ≥ 75%</text><rect x=\"550\" y=\"28\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"620\" y=\"47\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Hood closed</text><rect x=\"550\" y=\"76\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"620\" y=\"95\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">HVAC not at max demand</text><rect x=\"550\" y=\"124\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"620\" y=\"143\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">No steep incline</text><rect x=\"550\" y=\"172\" width=\"140\" height=\"30\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"1.5\" rx=\"5\"/><text x=\"620\" y=\"191\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Driver seatbelt on (some)</text><defs><marker id=\"ah691\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"150\" y1=\"43\" x2=\"268\" y2=\"95\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah691)\"/><defs><marker id=\"ah1887\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"150\" y1=\"91\" x2=\"268\" y2=\"100\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah1887)\"/><defs><marker id=\"ah6341\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"150\" y1=\"139\" x2=\"268\" y2=\"105\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah6341)\"/><defs><marker id=\"ah4617\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"150\" y1=\"187\" x2=\"270\" y2=\"112\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah4617)\"/><defs><marker id=\"ah7330\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"550\" y1=\"43\" x2=\"432\" y2=\"95\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah7330)\"/><defs><marker id=\"ah7942\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"550\" y1=\"91\" x2=\"432\" y2=\"100\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah7942)\"/><defs><marker id=\"ah2321\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"550\" y1=\"139\" x2=\"432\" y2=\"105\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah2321)\"/><defs><marker id=\"ah3977\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"550\" y1=\"187\" x2=\"430\" y2=\"112\" stroke=\"#e9a825\" stroke-width=\"1.5\" marker-end=\"url(#ah3977)\"/><rect x=\"270\" y=\"158\" width=\"160\" height=\"30\" fill=\"#2a9d8f\" stroke=\"#2a9d8f\" stroke-width=\"0\" rx=\"6\"/><text x=\"350\" y=\"177\" font-size=\"9.5\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Brake released → instant restart</text></svg>", "body": ["The ECM monitors multiple conditions simultaneously. Only when <strong>all conditions are met</strong> does it allow an idle stop. Any one condition failing prevents shut-down.", "Restart is triggered by the driver releasing the brake pedal. The ECM signals the starter (or an integrated starter-generator on mild hybrids) for an immediate restart — faster than a normal key start.", "<strong>Key diagnosis tip:</strong> If the system never activates, check scan tool data for which condition is failing before suspecting hardware."]}, {"heading": "Inhibit Conditions", "icon": "🚫", "svg": "<svg viewBox=\"0 0 700 210\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"16\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">SYSTEM WILL NOT ACTIVATE (INHIBIT CONDITIONS)</text><rect x=\"15\" y=\"28\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"177\" y=\"46\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">🌡 Engine too cold or too hot</text><rect x=\"15\" y=\"62\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"177\" y=\"80\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">🔋 Battery SOC below threshold</text><rect x=\"15\" y=\"96\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"177\" y=\"114\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">❄ HVAC on maximum demand</text><rect x=\"15\" y=\"130\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"177\" y=\"148\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">⛰ Steep incline detected</text><rect x=\"15\" y=\"164\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"177\" y=\"182\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">🔧 Hood open</text><rect x=\"360\" y=\"28\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"522\" y=\"46\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">🔄 Recent battery disconnect</text><rect x=\"360\" y=\"62\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"522\" y=\"80\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">🚗 Door open (some vehicles)</text><rect x=\"360\" y=\"96\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"522\" y=\"114\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">🔑 Seatbelt unfastened (some)</text><rect x=\"360\" y=\"130\" width=\"325\" height=\"28\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"1.5\" rx=\"4\"/><text x=\"522\" y=\"148\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">🌀 Steering wheel turning</text><rect x=\"130\" y=\"164\" width=\"440\" height=\"28\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"6\"/><text x=\"350\" y=\"182\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">✓ Check data list PIDs for inhibit status before condemning any part</text></svg>", "body": ["Any of these conditions will <strong>prevent idle stop from activating</strong>. Most are not failures — they are designed inhibits.", "The most common \"customer complaint\" is the system not working when the engine is cold (under operating temp) or when battery SOC is low. Both are correct system behavior.", "<strong>Always check data list PIDs for inhibit status first.</strong> A stored DTC plus an active inhibit condition visible in data = start here before condemning any part."]}, {"heading": "Battery Requirements &amp; Registration", "icon": "🔋", "svg": "<svg viewBox=\"0 0 700 205\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"16\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">BATTERY REQUIREMENTS — START-STOP VEHICLES</text><rect x=\"15\" y=\"28\" width=\"200\" height=\"130\" fill=\"#fff5f5\" stroke=\"#cc0000\" stroke-width=\"2\" rx=\"8\"/><text x=\"115\" y=\"50\" font-size=\"11\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Standard Flooded</text><text x=\"115\" y=\"64\" font-size=\"9.5\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">(SLA)</text><rect x=\"35\" y=\"74\" width=\"160\" height=\"18\" fill=\"#ffffff\" stroke=\"#555555\" stroke-width=\"1\" rx=\"3\"/><text x=\"115\" y=\"87\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">One big discharge → recharge</text><rect x=\"35\" y=\"96\" width=\"160\" height=\"18\" fill=\"#ffffff\" stroke=\"#555555\" stroke-width=\"1\" rx=\"3\"/><text x=\"115\" y=\"109\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Not designed for cycling</text><rect x=\"35\" y=\"118\" width=\"160\" height=\"18\" fill=\"#ffffff\" stroke=\"#555555\" stroke-width=\"1\" rx=\"3\"/><text x=\"115\" y=\"131\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Plates degrade rapidly</text><text x=\"115\" y=\"152\" font-size=\"10\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">✗ Wrong for start-stop</text><rect x=\"250\" y=\"28\" width=\"200\" height=\"130\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" rx=\"8\"/><text x=\"350\" y=\"50\" font-size=\"11\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">AGM / EFB</text><text x=\"350\" y=\"64\" font-size=\"9.5\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">(required type)</text><rect x=\"265\" y=\"74\" width=\"170\" height=\"18\" fill=\"#ffffff\" stroke=\"#2a9d8f\" stroke-width=\"1.5\" rx=\"3\"/><text x=\"350\" y=\"87\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Handles 100s of cycles/day</text><rect x=\"265\" y=\"96\" width=\"170\" height=\"18\" fill=\"#ffffff\" stroke=\"#2a9d8f\" stroke-width=\"1.5\" rx=\"3\"/><text x=\"350\" y=\"109\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Absorbed glass mat design</text><rect x=\"265\" y=\"118\" width=\"170\" height=\"18\" fill=\"#ffffff\" stroke=\"#2a9d8f\" stroke-width=\"1.5\" rx=\"3\"/><text x=\"350\" y=\"131\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Slow voltage recovery OK</text><text x=\"350\" y=\"152\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">✓ Required for start-stop</text><rect x=\"480\" y=\"28\" width=\"205\" height=\"130\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"8\"/><text x=\"582\" y=\"50\" font-size=\"11\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">⚠ Battery Registration</text><text x=\"582\" y=\"66\" font-size=\"9.5\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Required after replacement</text><rect x=\"492\" y=\"78\" width=\"183\" height=\"18\" fill=\"#ffffff\" stroke=\"#555555\" stroke-width=\"1\" rx=\"3\"/><text x=\"583\" y=\"91\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Use scan tool</text><rect x=\"492\" y=\"100\" width=\"183\" height=\"18\" fill=\"#ffffff\" stroke=\"#555555\" stroke-width=\"1\" rx=\"3\"/><text x=\"583\" y=\"113\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Register to ECM</text><rect x=\"492\" y=\"122\" width=\"183\" height=\"18\" fill=\"#ffffff\" stroke=\"#555555\" stroke-width=\"1\" rx=\"3\"/><text x=\"583\" y=\"135\" font-size=\"8.5\" fill=\"#1a1a1a\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Resets SOC algorithm</text><text x=\"582\" y=\"152\" font-size=\"9.5\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Skip this = early failure</text><text x=\"350\" y=\"178\" font-size=\"9\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Installing a standard flooded battery in a start-stop vehicle → premature battery failure</text><text x=\"350\" y=\"192\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Same capacity AND same type required</text></svg>", "body": ["<strong>AGM or EFB required.</strong> Standard flooded batteries are designed for one large discharge then a long recharge. Start-stop systems may cycle hundreds of times per day — a standard battery's plates degrade rapidly under this load.", "<strong>Battery registration is mandatory after replacement.</strong> The ECM's SOC algorithm is calibrated to the installed battery. Install a new battery without registering it and the ECM calculates SOC incorrectly from day one.", "Wrong battery type + skipped registration = return visit within months."]}];
const QS=[{"text": "A start-stop vehicle won't re-start after an idle stop. No DTCs. Scan tool shows coolant temp at 35°C. Most likely cause?", "choices": ["Starter motor has failed", "ECM has disabled start-stop because the engine has not reached operating temperature", "Battery SOC is critically low", "Park/neutral position switch has failed"], "correct": 1, "explanation": "35°C is a cold engine — well below operating temperature (~80°C). The start-stop system will not activate until the engine reaches operating temp because a cold engine needs to keep running for warmup, emissions control, and cabin heat. This is designed behavior, not a failure. No DTC would be set."}, {"text": "When replacing the battery on a start-stop vehicle, what additional step is required?", "choices": ["Nothing — install and connect", "Reset the throttle body", "Register the new battery to the ECM so the SOC algorithm resets", "Bleed the brake system"], "correct": 2, "explanation": "The ECM monitors battery SOC continuously and uses it to decide whether to allow idle stops. The SOC algorithm is calibrated to the battery's baseline. Installing a new battery without registering it means the ECM's SOC calculation is wrong from the start — causing incorrect charging decisions and potentially inhibiting start-stop immediately."}, {"text": "Which battery type is required for most idle stop/start systems?", "choices": ["Standard flooded lead-acid — lower internal resistance handles current surges", "Deep cycle marine battery — designed for repeated discharge", "AGM or EFB — designed for hundreds of charge/discharge micro-cycles per day", "Lithium-ion — lightest weight"], "correct": 2, "explanation": "Standard flooded batteries handle one big discharge followed by a long recharge. Start-stop systems may cycle hundreds of times daily — far beyond what a flooded battery can handle before the plates degrade. AGM's internal construction handles deep, repeated cycling. Installing a standard flooded battery in a start-stop vehicle = premature battery failure."}];
const TOT=SL.length+QS.length;
let cur=0,ans=new Array(QS.length).fill(false);
const LT=['A','B','C','D'];

function prog(n){
  const p=Math.round(n/TOT*100);
  document.getElementById('prog-bar').style.width=p+'%';
  document.getElementById('prog-lbl').textContent='Progress — '+p+'%';
}
function go(d){cur+=d;if(cur<0)cur=0;if(cur>=TOT)return;render();}
function render(){
  const el=document.getElementById('content');
  const isS=cur<SL.length;
  document.getElementById('back-btn').disabled=(cur===0);
  document.getElementById('next-btn').disabled=false;
  document.getElementById('next-btn').classList.remove('locked');
  if(cur>=TOT){prog(TOT);el.innerHTML='';showDone(el);document.getElementById('nav').style.display='none';return;}
  prog(cur);
  document.getElementById('nav').style.display='flex';
  if(isS){
    document.getElementById('step-ind').textContent='Slide '+(cur+1)+' of '+SL.length;
    renderS(SL[cur],el);
  }else{
    const qi=cur-SL.length;
    document.getElementById('step-ind').textContent='Question '+(qi+1)+' of '+QS.length;
    if(!ans[qi]){document.getElementById('next-btn').classList.add('locked');document.getElementById('next-btn').disabled=true;}
    renderQ(qi,QS[qi],el);
  }
}
function renderS(s,el){
  const body=s.body.map(b=>'<p>'+b+'</p>').join('');
  el.innerHTML='<div class="slide active"><span class="slide-icon">'+s.icon+'</span><h2>'+s.heading+'</h2>'+(s.svg?'<div class="slide-svg">'+s.svg+'</div>':'')+'<div class="slide-body">'+body+'</div></div>';
}
function renderQ(qi,q,el){
  const ch=q.choices.map((c,i)=>'<li><button class="ch-btn" onclick="pick('+qi+','+i+',this)" id="c'+qi+'_'+i+'"><span class="letter">'+LT[i]+'</span><span>'+c+'</span></button></li>').join('');
  el.innerHTML='<div class="quiz active"><div class="quiz-lbl">Knowledge Check · Question '+(qi+1)+' of '+QS.length+'</div><h2>'+q.text+'</h2><ul class="choices">'+ch+'</ul><div class="feedback" id="fb'+qi+'"></div></div>';
  if(ans[qi])restoreQ(qi,q);
}
function pick(qi,ch,btn){
  if(ans[qi])return;
  ans[qi]=true;
  const q=QS[qi],ok=q.correct;
  document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===ok)b.classList.add(ch===ok?'correct':'revealed');});
  if(ch!==ok)btn.classList.add('wrong');
  const fb=document.getElementById('fb'+qi);
  fb.className='feedback '+(ch===ok?'correct':'wrong');
  fb.innerHTML='<strong>'+(ch===ok?'✓ Correct!':'✗ Not quite.')+'</strong>'+q.explanation;
  document.getElementById('next-btn').classList.remove('locked');
  document.getElementById('next-btn').disabled=false;
  if(qi===QS.length-1)document.getElementById('next-btn').textContent='Finish →';
}
function restoreQ(qi,q){
  document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('revealed');});
  const fb=document.getElementById('fb'+qi);
  if(fb){fb.className='feedback correct';fb.innerHTML='<strong>Already answered.</strong>';}
}
function showDone(el){
  el.innerHTML='<div id="complete"><span class="ck">✅</span><h3>Lesson Complete</h3><p>All slides and knowledge check questions finished.</p><button class="restart" onclick="restart()">&#8635; Restart Lesson</button></div>';
}
function restart(){cur=0;ans=new Array(QS.length).fill(false);document.getElementById('next-btn').textContent='Next →';document.getElementById('nav').style.display='flex';render();}
render();
</script>
</body>
</html>
