<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starter Circuits — Pre-ECM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#2a9d8f;--teal-bg:#f0faf8;--teal-dk:#0d2b28;
  --amber:#e9a825;--amber-bg:#fffbf0;
  --dark:#1a1a1a;--muted:#555555;--lgray:#f5f5f5;--white:#fff;--red:#cc0000;
}
html,body{height:100%;font-family:"Source Sans 3",Arial,sans-serif;background:var(--dark);color:var(--dark);font-size:15px;line-height:1.5}
#shell{display:flex;flex-direction:column;min-height:100vh;max-width:780px;margin:0 auto;background:var(--white)}
header{background:var(--dark);border-top:5px solid var(--teal);padding:12px 20px 10px}
.course-label{color:var(--teal);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
header h1{font-family:"Oswald",Arial,sans-serif;font-size:17px;color:#fff;font-weight:700;margin-bottom:1px;line-height:1.2}
header .sub{color:#aaa;font-size:11.5px}
#prog-wrap{background:#2a2a2a;border-bottom:1px solid #333;padding:8px 20px 7px}
#prog-lbl{color:#aaa;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
#prog-track{background:#3a3a3a;border-radius:4px;height:6px;overflow:hidden}
#prog-bar{background:var(--amber);height:100%;border-radius:4px;width:0%;transition:width .35s ease}
#content{flex:1;padding:16px 18px 12px;overflow-y:auto}
.slide,.quiz{display:none;animation:fi .25s ease}
.slide.active,.quiz.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.slide-icon{font-size:26px;display:block;margin-bottom:5px}
.slide h2{font-family:"Oswald",Arial,sans-serif;font-size:18px;font-weight:700;color:var(--teal);margin-bottom:8px;line-height:1.2}
.slide-svg{width:100%;margin:6px 0 10px;display:block}
.slide-body{background:var(--lgray);border-left:4px solid var(--teal);border-radius:0 7px 7px 0;padding:11px 14px;font-size:13.5px;line-height:1.6}
.slide-body p{margin-bottom:6px}.slide-body p:last-child{margin-bottom:0}
.quiz-lbl{color:var(--teal);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.quiz h2{font-size:14.5px;font-weight:700;color:var(--dark);margin-bottom:12px;line-height:1.45}
.choices{list-style:none;display:flex;flex-direction:column;gap:7px}
.ch-btn{display:flex;align-items:flex-start;gap:9px;background:#fff;border:2px solid #d0d0d0;border-radius:7px;padding:9px 12px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;font-size:13.5px;line-height:1.45;color:var(--dark);text-align:left;transition:border-color .15s,background .15s;width:100%}
.ch-btn:hover:not(:disabled){border-color:var(--teal);background:var(--teal-bg)}
.letter{flex-shrink:0;background:#e8e8e8;color:var(--muted);font-weight:700;font-size:11.5px;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background .15s,color .15s}
.ch-btn.correct{border-color:var(--teal);background:var(--teal-bg)}.ch-btn.correct .letter{background:var(--teal);color:#fff}
.ch-btn.wrong{border-color:var(--red);background:#fff5f5}.ch-btn.wrong .letter{background:var(--red);color:#fff}
.ch-btn.revealed{border-color:var(--teal);background:var(--teal-bg);opacity:.6}.ch-btn.revealed .letter{background:var(--teal);color:#fff}
.ch-btn:disabled{cursor:default}
.feedback{display:none;margin-top:10px;padding:11px 13px;border-radius:7px;font-size:13px;line-height:1.5}
.feedback.correct{display:block;background:var(--teal-bg);border-left:4px solid var(--teal)}
.feedback.wrong{display:block;background:#fff5f5;border-left:4px solid var(--red)}
.feedback strong{display:block;margin-bottom:2px}
#complete{display:none;background:var(--teal-dk);border:2px solid var(--teal);border-radius:10px;padding:20px;text-align:center;animation:fi .4s ease}
#complete .ck{font-size:34px;margin-bottom:5px;display:block}
#complete h3{font-family:"Oswald",Arial,sans-serif;font-size:19px;color:var(--teal);margin-bottom:3px}
#complete p{color:#ccc;font-size:12.5px;margin-bottom:12px}
.restart{display:inline-block;background:transparent;color:var(--teal);border:1.5px solid var(--teal);padding:6px 16px;border-radius:5px;font-size:12.5px;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s,color .15s}
.restart:hover{background:var(--teal);color:#fff}
#nav{background:#f5f5f5;border-top:2px solid var(--teal);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
#step-ind{font-size:11.5px;color:var(--muted);text-align:center;flex:1}
.nbtn{background:var(--dark);color:#fff;border:none;border-radius:5px;padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:"Source Sans 3",Arial,sans-serif;transition:background .15s;min-width:74px}
.nbtn:hover{background:var(--teal)}.nbtn:disabled,.nbtn.locked{background:#ccc;color:#888;cursor:default}
</style>
</head>
<body>
<div id="shell">
<header>
  <div class="course-label">AUTOA 123 · Micro Lesson</div>
  <h1>Starter Circuits — Pre-ECM</h1>
  <div class="sub">Basic Series Control Circuit · Ignition Switch · PNP Switch</div>
</header>
<div id="prog-wrap">
  <div id="prog-lbl">Progress</div>
  <div id="prog-track"><div id="prog-bar"></div></div>
</div>
<div id="content"></div>
<div id="nav">
  <button class="nbtn" id="back-btn" onclick="go(-1)" disabled>← Back</button>
  <div id="step-ind">—</div>
  <button class="nbtn" id="next-btn" onclick="go(1)">Next →</button>
</div>
</div>

fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"6\"/><text x=\"505\" y=\"55\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Starter</text><text x=\"505\" y=\"68\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Motor</text><defs><marker id=\"ah3071\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#2a9d8f\"/></marker></defs><line x1=\"90\" y1=\"60\" x2=\"118\" y2=\"60\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" marker-end=\"url(#ah3071)\"/><defs><marker id=\"ah563\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#2a9d8f\"/></marker></defs><line x1=\"190\" y1=\"60\" x2=\"223\" y2=\"60\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" marker-end=\"url(#ah563)\"/><defs><marker id=\"ah123\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#2a9d8f\"/></marker></defs><line x1=\"305\" y1=\"60\" x2=\"343\" y2=\"60\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" marker-end=\"url(#ah123)\"/><defs><marker id=\"ah8480\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#2a9d8f\"/></marker></defs><line x1=\"425\" y1=\"60\" x2=\"463\" y2=\"60\" stroke=\"#2a9d8f\" stroke-width=\"2.5\" marker-end=\"url(#ah8480)\"/><line x1=\"505\" y1=\"85\" x2=\"505\" y2=\"105\" stroke=\"#1a1a1a\" stroke-width=\"1.5\"/><line x1=\"55\" y1=\"105\" x2=\"505\" y2=\"105\" stroke=\"#1a1a1a\" stroke-width=\"1.5\"/><line x1=\"55\" y1=\"85\" x2=\"55\" y2=\"105\" stroke=\"#1a1a1a\" stroke-width=\"1.5\"/><rect x=\"225\" y=\"100\" width=\"80\" height=\"14\" fill=\"#1a1a1a\" stroke=\"#1a1a1a\" stroke-width=\"0\" rx=\"0\"/><text x=\"265\" y=\"111\" font-size=\"9\" fill=\"#ffffff\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">GND</text><text x=\"350\" y=\"120\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">← POWER PATH (high current, large cable) →</text><text x=\"350\" y=\"140\" font-size=\"9.5\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">← CONTROL PATH (low current, small wire) →</text><rect x=\"20\" y=\"150\" width=\"80\" height=\"42\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"4\"/><text x=\"60\" y=\"168\" font-size=\"9.5\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Ignition</text><text x=\"60\" y=\"180\" font-size=\"9.5\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Switch</text><rect x=\"140\" y=\"150\" width=\"80\" height=\"42\" fill=\"#fffbf0\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"4\"/><text x=\"180\" y=\"168\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">PNP / Clutch</text><text x=\"180\" y=\"180\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Switch</text><rect x=\"260\" y=\"150\" width=\"80\" height=\"42\" fill=\"#ffffff\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"4\"/><text x=\"300\" y=\"168\" font-size=\"9.5\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Relay</text><text x=\"300\" y=\"180\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Coil 85→86</text><rect x=\"385\" y=\"150\" width=\"80\" height=\"42\" fill=\"#ffffff\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"4\"/><text x=\"425\" y=\"168\" font-size=\"9.5\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Solenoid</text><text x=\"425\" y=\"180\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">S-terminal</text><defs><marker id=\"ah4970\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"100\" y1=\"171\" x2=\"138\" y2=\"171\" stroke=\"#e9a825\" stroke-width=\"2\" marker-end=\"url(#ah4970)\"/><defs><marker id=\"ah3074\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"220\" y1=\"171\" x2=\"258\" y2=\"171\" stroke=\"#e9a825\" stroke-width=\"2\" marker-end=\"url(#ah3074)\"/><defs><marker id=\"ah3055\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"340\" y1=\"171\" x2=\"383\" y2=\"171\" stroke=\"#e9a825\" stroke-width=\"2\" marker-end=\"url(#ah3055)\"/><line x1=\"465\" y1=\"171\" x2=\"490\" y2=\"171\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><line x1=\"490\" y1=\"171\" x2=\"490\" y2=\"205\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><line x1=\"270\" y1=\"205\" x2=\"490\" y2=\"205\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><line x1=\"270\" y1=\"205\" x2=\"270\" y2=\"192\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><text x=\"350\" y=\"215\" font-size=\"8\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">GND</text></svg>", "body": ["<strong>Power path (teal — high current):</strong> Battery → fuse/link → Relay main contacts (30→87) → Solenoid B+ → Motor → Ground", "<strong>Control path (amber — low current):</strong> Battery → Ignition switch → PNP switch → Relay coil (85→86) → Ground", "When the control path is complete, the relay fires. The main contacts close. Battery power reaches the solenoid. Engine cranks."]}, {"heading": "The Park/Neutral Position Switch", "icon": "🔒", "svg": "<svg viewBox=\"0 0 700 215\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"background:#ffffff;border-radius:8px;margin:10px 0 8px;display:block;max-width:100%\"><text x=\"350\" y=\"18\" font-size=\"11\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">PARK/NEUTRAL POSITION SWITCH</text><rect x=\"20\" y=\"30\" width=\"290\" height=\"170\" fill=\"#f0faf8\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"8\"/><text x=\"165\" y=\"52\" font-size=\"10\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Park or Neutral — Contacts CLOSED</text><line x1=\"40\" y1=\"90\" x2=\"90\" y2=\"90\" stroke=\"#2a9d8f\" stroke-width=\"3\"/><rect x=\"90\" y=\"74\" width=\"60\" height=\"32\" fill=\"#ffffff\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"4\"/><text x=\"120\" y=\"94\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Ign Sw</text><line x1=\"150\" y1=\"90\" x2=\"180\" y2=\"90\" stroke=\"#2a9d8f\" stroke-width=\"3\"/><line x1=\"180\" y1=\"90\" x2=\"200\" y2=\"90\" stroke=\"#2a9d8f\" stroke-width=\"3\"/><circle cx=\"205\" cy=\"90\" r=\"5\" fill=\"#2a9d8f\" stroke=\"#2a9d8f\" stroke-width=\"0\"/><circle cx=\"225\" cy=\"90\" r=\"5\" fill=\"#2a9d8f\" stroke=\"#2a9d8f\" stroke-width=\"0\"/><line x1=\"210\" y1=\"90\" x2=\"220\" y2=\"90\" stroke=\"#2a9d8f\" stroke-width=\"3\"/><line x1=\"230\" y1=\"90\" x2=\"260\" y2=\"90\" stroke=\"#2a9d8f\" stroke-width=\"3\"/><rect x=\"260\" y=\"74\" width=\"60\" height=\"32\" fill=\"#ffffff\" stroke=\"#2a9d8f\" stroke-width=\"2\" rx=\"4\"/><text x=\"290\" y=\"94\" font-size=\"9.5\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Relay</text><line x1=\"320\" y1=\"90\" x2=\"300\" y2=\"90\" stroke=\"#2a9d8f\" stroke-width=\"1\"/><text x=\"165\" y=\"120\" font-size=\"11\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">✓ Circuit c erif\">Relay</text><text x=\"261\" y=\"138\" font-size=\"8.5\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Coil</text><rect x=\"330\" y=\"110\" width=\"72\" height=\"38\" fill=\"#ffffff\" stroke=\"#e9a825\" stroke-width=\"2\" rx=\"4\"/><text x=\"366\" y=\"127\" font-size=\"9\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial,sans-serif\">Solenoid</text><text x=\"366\" y=\"138\" font-size=\"8.5\" fill=\"#e9a825\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">S-term</text><defs><marker id=\"ah5039\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"92\" y1=\"129\" x2=\"120\" y2=\"129\" stroke=\"#e9a825\" stroke-width=\"2\" marker-end=\"url(#ah5039)\"/><defs><marker id=\"ah9131\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"194\" y1=\"129\" x2=\"223\" y2=\"129\" stroke=\"#e9a825\" stroke-width=\"2\" marker-end=\"url(#ah9131)\"/><defs><marker id=\"ah3191\" markerWidth=\"8\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 8 3, 0 6\" fill=\"#e9a825\"/></marker></defs><line x1=\"297\" y1=\"129\" x2=\"328\" y2=\"129\" stroke=\"#e9a825\" stroke-width=\"2\" marker-end=\"url(#ah3191)\"/><line x1=\"402\" y1=\"129\" x2=\"430\" y2=\"129\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><line x1=\"430\" y1=\"129\" x2=\"430\" y2=\"160\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><line x1=\"240\" y1=\"160\" x2=\"430\" y2=\"160\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><line x1=\"240\" y1=\"148\" x2=\"240\" y2=\"160\" stroke=\"#e9a825\" stroke-width=\"1.5\"/><text x=\"158\" y=\"178\" font-size=\"9\" fill=\"#2a9d8f\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">← If 12V here…</text><text x=\"261\" y=\"178\" font-size=\"9\" fill=\"#cc0000\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">…but 0V here = fault between these two points</text><line x1=\"158\" y1=\"170\" x2=\"158\" y2=\"148\" stroke=\"#555555\" stroke-width=\"0.8\" stroke-dasharray=\"3,2\"/><line x1=\"261\" y1=\"170\" x2=\"261\" y2=\"148\" stroke=\"#555555\" stroke-width=\"0.8\" stroke-dasharray=\"3,2\"/><text x=\"350\" y=\"200\" font-size=\"9\" fill=\"#555555\" text-anchor=\"middle\" font-weight=\"normal\" font-family=\"Arial,sans-serif\">Work back from the open. Each component in the control path is a potential fault location.</text></svg>", "body": ["Trace the <strong>control path</strong> from battery positive to ground. Every component must pass current for the relay to fire.", "Diagnostic method: Test voltage at each point in sequence with the key in START. The point where 12V becomes 0V is where the open is.", "<strong>Example:</strong> 12V at ignition switch output, 0V at relay coil terminal 85 → fault between those two points. Check the PNP switch and wiring in between."]}];
const QS=[{"text": "In a basic pre-ECM starting circuit, the park/neutral position switch is located:", "choices": ["Between the battery positive terminal and the starter relay main contacts", "Between the ignition switch and the starter relay coil", "Between the starter relay output and the solenoid S-terminal", "Inside the starter solenoid assembly"], "correct": 1, "explanation": "The PNP switch is in series with the low-current control side — between the ignition switch output and the relay coil. When the switch opens (transmission in gear), the relay coil loses its path to ground and cannot energize, preventing cranking."}, {"text": "The large-diameter cable connecting the battery positive terminal to the starter B+ terminal carries:", "choices": ["Low current — just enough to trigger the relay coil", "High current — all the cranking amperage the motor needs", "A 5V reference signal from the ECM", "The same current as the ignition switch circuit"], "correct": 1, "explanation": "The power path cable carries all cranking current — typically 90–250A. That's why it's a large-diameter cable. The control path wires carry under 1A — completely different job, completely different wire size."}, {"text": "What opens the park/neutral position switch when the gear selector is moved to Drive?", "choices": ["The ECM sends a signal to open the switch", "The ignition switch interrupts the circuit", "A mechanical connection to the gear selector physically opens the switch contacts", "The starter relay coil de-energizes and releases the switch"], "correct": 2, "explanation": "In a pre-ECM system the PNP switch is entirely mechanical. Moving the gear selector physically moves a cam or lever that opens the switch contacts. No module involvement. This is why wiggling the shifter on an older car sometimes clears a no-crank — you're mechanically re-seating the switch."}];
const TOT=SL.length+QS.length;
let cur=0,ans=new Array(QS.length).fill(false);
const LT=['A','B','C','D'];

function prog(n){
  const p=Math.round(n/TOT*100);
  document.getElementById('prog-bar').style.width=p+'%';
  document.getElementById('prog-lbl').textContent='Progress — '+p+'%';
}
function go(d){cur+=d;if(cur<0)cur=0;if(cur>=TOT)return;render();}
function render(){
  const el=document.getElementById('content');
  const isS=cur<SL.length;
  document.getElementById('back-btn').disabled=(cur===0);
  document.getElementById('next-btn').disabled=false;
  document.getElementById('next-btn').classList.remove('locked');
  if(cur>=TOT){prog(TOT);el.innerHTML='';showDone(el);document.getElementById('nav').style.display='none';return;}
  prog(cur);
  document.getElementById('nav').style.display='flex';
  if(isS){
    document.getElementById('step-ind').textContent='Slide '+(cur+1)+' of '+SL.length;
    renderS(SL[cur],el);
  }else{
    const qi=cur-SL.length;
    document.getElementById('step-ind').textContent='Question '+(qi+1)+' of '+QS.length;
    if(!ans[qi]){document.getElementById('next-btn').classList.add('locked');document.getElementById('next-btn').disabled=true;}
    renderQ(qi,QS[qi],el);
  }
}
function renderS(s,el){
  const body=s.body.map(b=>'<p>'+b+'</p>').join('');
  el.innerHTML='<div class="slide active"><span class="slide-icon">'+s.icon+'</span><h2>'+s.heading+'</h2>'+(s.svg?'<div class="slide-svg">'+s.svg+'</div>':'')+'<div class="slide-body">'+body+'</div></div>';
}
function renderQ(qi,q,el){
  const ch=q.choices.map((c,i)=>'<li><button class="ch-btn" onclick="pick('+qi+','+i+',this)" id="c'+qi+'_'+i+'"><span class="letter">'+LT[i]+'</span><span>'+c+'</span></button></li>').join('');
  el.innerHTML='<div class="quiz active"><div class="quiz-lbl">Knowledge Check · Question '+(qi+1)+' of '+QS.length+'</div><h2>'+q.text+'</h2><ul class="choices">'+ch+'</ul><div class="feedback" id="fb'+qi+'"></div></div>';
  if(ans[qi])restoreQ(qi,q);
}
function pick(qi,ch,btn){
  if(ans[qi])return;
  ans[qi]=true;
  const q=QS[qi],ok=q.correct;
  document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===ok)b.classList.add(ch===ok?'correct':'revealed');});
  if(ch!==ok)btn.classList.add('wrong');
  const fb=document.getElementById('fb'+qi);
  fb.className='feedback '+(ch===ok?'correct':'wrong');
  fb.innerHTML='<strong>'+(ch===ok?'✓ Correct!':'✗ Not quite.')+'</strong>'+q.explanation;
  document.getElementById('next-btn').classList.remove('locked');
  document.getElementById('next-btn').disabled=false;
  if(qi===QS.length-1)document.getElementById('next-btn').textContent='Finish →';
}
function restoreQ(qi,q){
  document.querySelectorAll('.ch-btn').forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('revealed');});
  const fb=document.getElementById('fb'+qi);
  if(fb){fb.className='feedback correct';fb.innerHTML='<strong>Already answered.</strong>';}
}
function showDone(el){
  el.innerHTML='<div id="complete"><span class="ck">✅</span><h3>Lesson Complete</h3><p>All slides and knowledge check questions finished.</p><button class="restart" onclick="restart()">&#8635; Restart Lesson</button></div>';
}
function restart(){cur=0;ans=new Array(QS.length).fill(false);document.getElementById('next-btn').textContent='Next →';document.getElementById('nav').style.display='flex';render();}
render();
</script>
