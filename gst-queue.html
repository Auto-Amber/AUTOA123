<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GST Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: 'Barlow', sans-serif; color: #f0f0f0; min-height: 100vh; }

    .header {
      background: #1a1a1a;
      border-bottom: 3px solid #2E8B57;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
    }
    .header-title span { color: #2E8B57; }
    .mode-toggle {
      background: none;
      border: 1px solid #2E8B5755;
      color: #2E8B57;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 2px;
    }

    .location-banner {
      background: #0D2818;
      border-bottom: 1px solid #2E8B5733;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .location-dot {
      width: 8px; height: 8px;
      background: #2E8B57;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.8); }
    }
    .location-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #2E8B57;
      white-space: nowrap;
    }
    .location-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
    }

    .main { max-width: 560px; margin: 0 auto; padding: 20px 16px; }

    .queue-counter {
      background: #1a1a1a;
      border: 1px solid #2E8B5733;
      border-top: 3px solid #2E8B57;
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }
    .queue-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: #2E8B57;
      line-height: 1;
    }
    .queue-label { font-size: 0.85rem; color: #888; margin-top: 4px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2E8B5733;
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2E8B57;
      margin-bottom: 14px;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 5px;
    }
    .field input, .field textarea {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 3px;
      color: #f0f0f0;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      padding: 10px 12px;
      outline: none;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus { border-color: #2E8B57; }

    .loc-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-top: 4px;
    }
    .loc-btn {
      background: #111;
      border: 1px solid #333;
      border-radius: 3px;
      color: #bbb;
      font-family: 'Barlow', sans-serif;
      font-size: 0.82rem;
      padding: 9px 6px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .loc-btn:hover { border-color: #2E8B57; color: #fff; }
    .loc-btn.active { background: #0D2818; border-color: #2E8B57; color: #2E8B57; font-weight: 600; }

    .btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 20px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-primary { background: #2E8B57; color: #fff; }
    .btn-primary:hover { background: #256F45; }
    .btn-primary:disabled { background: #183D27; color: #444; cursor: not-allowed; }
    .btn-danger { background: #c0392b; color: #fff; margin-top: 8px; }
    .btn-danger:hover { background: #a93226; }

    .confirmation {
      background: #0D2818;
      border: 1px solid #2E8B57;
      border-radius: 4px;
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .confirmation-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 4rem;
      font-weight: 900;
      color: #2E8B57;
      line-height: 1;
    }
    .confirmation-text { color: #aaa; font-size: 0.9rem; margin-top: 8px; line-height: 1.6; }
    .confirmation-name { color: #fff; font-weight: 600; }

    /* INSTRUCTOR */
    .password-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; gap: 14px;
    }
    .password-screen h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: #2E8B57;
    }
    .password-screen input {
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 3px; color: #f0f0f0;
      font-size: 1rem; padding: 10px 16px;
      outline: none; text-align: center;
      letter-spacing: 0.2em; width: 200px;
    }
    .password-screen input:focus { border-color: #2E8B57; }
    .error-text { color: #c0392b; font-size: 0.85rem; }

    .queue-item {
      background: #1a1a1a;
      border: 1px solid #2E8B5722;
      border-left: 3px solid #2E8B57;
      border-radius: 3px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .queue-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 900;
      color: #2E8B5744; min-width: 24px; line-height: 1;
    }
    .queue-info { flex: 1; }
    .queue-name { font-weight: 600; color: #fff; font-size: 0.95rem; }
    .queue-need { color: #888; font-size: 0.83rem; margin-top: 2px; }
    .queue-where { color: #2E8B5788; font-size: 0.78rem; margin-top: 2px; }
    .queue-time { color: #555; font-size: 0.72rem; margin-top: 3px; }
    .done-btn {
      background: #2E8B57; border: none; color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 6px 10px;
      border-radius: 2px; cursor: pointer; white-space: nowrap;
      flex-shrink: 0;
    }
    .done-btn:hover { background: #256F45; }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: #555; margin-bottom: 8px;
    }
    .empty-queue { text-align: center; color: #555; font-size: 0.9rem; padding: 28px; font-style: italic; }
    .clear-link { background: none; border: none; color: #555; font-size: 0.75rem; cursor: pointer; font-family: 'Barlow', sans-serif; }
    .clear-link:hover { color: #c0392b; }
    .hidden { display: none; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">GST <span>Queue</span></div>
  <button class="mode-toggle" onclick="toggleMode()">Instructor</button>
</div>

<!-- LOCATION BANNER -->
<div class="location-banner">
  <div class="location-dot"></div>
  <div class="location-label">Mark is at</div>
  <div class="location-value" id="currentLocation">Loading...</div>
</div>

<!-- ========== STUDENT VIEW ========== -->
<div id="studentView">
  <div class="main">

    <div class="queue-counter">
      <div class="queue-number" id="queueCount">0</div>
      <div class="queue-label" id="queueLabel">students in queue</div>
    </div>

    <!-- Confirmation (hidden until submitted) -->
    <div class="confirmation hidden" id="confirmationCard">
      <div class="confirmation-number" id="myPosition">#1</div>
      <div class="confirmation-text" id="confirmText">You're in line!</div>
      <button class="btn btn-danger" style="width:auto;padding:8px 20px;font-size:0.8rem;margin-top:16px;" onclick="removeMyself()">
        Never mind, I'm good
      </button>
    </div>

    <!-- Submit form -->
    <div class="card" id="submitForm">
      <div class="card-title">Get in Line</div>
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="studentName" placeholder="First name is fine" />
      </div>
      <div class="field">
        <label>What do you need?</label>
        <textarea id="studentNeed" rows="3" placeholder="e.g. Question about the lab, need a tool, torque spec..."></textarea>
      </div>
      <div class="field">
        <label>Where are you right now?</label>
        <div class="loc-grid" id="studentLocGrid"></div>
      </div>
      <button class="btn btn-primary" id="submitBtn" onclick="submitToQueue()" disabled>Add Me to Queue</button>
    </div>

  </div>
</div>

<!-- ========== INSTRUCTOR VIEW ========== -->
<div id="instructorView" class="hidden">

  <!-- Password screen -->
  <div class="password-screen" id="passwordScreen">
    <h2>Instructor Access</h2>
    <input type="password" id="passwordInput" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" onkeydown="if(event.key==='Enter')checkPassword()" />
    <div class="error-text hidden" id="pwError">Wrong password</div>
    <button class="btn btn-primary" style="width:180px;" onclick="checkPassword()">Enter</button>
  </div>

  <!-- Instructor dashboard (hidden until authed) -->
  <div class="hidden" id="instructorDash">
    <div class="main">

      <!-- Location picker -->
      <div class="card">
        <div class="card-title">Your Location</div>
        <div class="loc-grid" id="instructorLocGrid"></div>
      </div>

      <!-- Queue list -->
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div class="section-label" id="queueSectionLabel">Queue: 0 waiting</div>
          <button class="clear-link" onclick="clearAll()">Clear all</button>
        </div>
        <div id="queueList"><div class="empty-queue">Queue is empty. You&rsquo;re caught up &#127881;</div></div>
      </div>

    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, push, remove, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ========================================================
  // FIREBASE CONFIG - REPLACE WITH YOUR GST-QUEUE PROJECT VALUES
  // ========================================================
  const firebaseConfig = {
    apiKey: "AIzaSyDXkYDNdiZtQQN6_9xuSO0k9yb-tVXxwA8",
    authDomain: "gst-queue.firebaseapp.com",
    databaseURL: "https://gst-queue-default-rtdb.firebaseio.com",
    projectId: "gst-queue",
    storageBucket: "gst-queue.firebasestorage.app",
    messagingSenderId: "731486280050",
    appId: "1:731486280050:web:6cdc9091b32c189169a5eb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const LOCATIONS = [
    "GST Classroom","Main Shop","Tool Room","Tire Room",
    "Brake Room","Alignment Room","Toyota","Honda",
    "Upstairs","AST Classroom","Away for a Moment"
  ];

  const INSTRUCTOR_PASSWORD = "GST2026";

  let myItemId = null;
  let myName = null;
  let selectedStudentLoc = null;
  let currentQueue = [];
  let currentMode = "student";

  // BUILD LOCATION GRIDS
  function buildLocGrids() {
    const studentGrid = document.getElementById("studentLocGrid");
    const instructorGrid = document.getElementById("instructorLocGrid");
    LOCATIONS.forEach(loc => {
      // Student grid
      const sb = document.createElement("button");
      sb.className = "loc-btn";
      sb.textContent = loc;
      sb.dataset.loc = loc;
      sb.onclick = () => {
        selectedStudentLoc = loc;
        studentGrid.querySelectorAll(".loc-btn").forEach(b => b.classList.remove("active"));
        sb.classList.add("active");
        checkSubmitReady();
      };
      studentGrid.appendChild(sb);

      // Instructor grid
      const ib = document.createElement("button");
      ib.className = "loc-btn";
      ib.textContent = loc;
      ib.dataset.loc = loc;
      ib.onclick = () => {
        set(ref(db, "location"), loc);
      };
      instructorGrid.appendChild(ib);
    });
  }

  // LISTEN: location
  onValue(ref(db, "location"), snap => {
    const loc = snap.val() || "GST Classroom";
    document.getElementById("currentLocation").textContent = loc;
    document.querySelectorAll("#instructorLocGrid .loc-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.loc === loc);
    });
  });

  // LISTEN: queue
  onValue(ref(db, "queue"), snap => {
    const data = snap.val();
    currentQueue = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
    currentQueue.sort((a, b) => a.timestamp - b.timestamp);

    document.getElementById("queueCount").textContent = currentQueue.length;
    document.getElementById("queueLabel").textContent = currentQueue.length === 1 ? "student in queue" : "students in queue";

    if (myItemId) {
      const pos = currentQueue.findIndex(i => i.id === myItemId) + 1;
      if (pos > 0) {
        document.getElementById("myPosition").textContent = `#${pos}`;
        const ahead = pos - 1;
        document.getElementById("confirmText").innerHTML =
          `You're in line, <span class="confirmation-name">${myName}</span>!<br/>` +
          (ahead === 0 ? "You're next, hang tight!" : `${ahead} student${ahead > 1 ? "s" : ""} ahead of you.`);
      } else {
        myItemId = null;
        document.getElementById("confirmationCard").classList.add("hidden");
        document.getElementById("submitForm").classList.remove("hidden");
      }
    }

    const list = document.getElementById("queueList");
    document.getElementById("queueSectionLabel").textContent = `Queue: ${currentQueue.length} waiting`;
    if (currentQueue.length === 0) {
      list.innerHTML = `<div class="empty-queue">Queue is empty. You&rsquo;re caught up &#127881;</div>`;
    } else {
      list.innerHTML = currentQueue.map((item, i) => `
        <div class="queue-item">
          <div class="queue-num">${i + 1}</div>
          <div class="queue-info">
            <div class="queue-name">${escHtml(item.name)}</div>
            <div class="queue-need">${escHtml(item.need)}</div>
            ${item.studentLocation ? `<div class="queue-where">&#128205; ${escHtml(item.studentLocation)}</div>` : ""}
            <div class="queue-time">${timeAgo(item.timestamp)}</div>
          </div>
          <button class="done-btn" onclick="window._doneItem('${item.id}')">&#10003; Done</button>
        </div>
      `).join("");
    }
  });

  // SUBMIT
  window.checkSubmitReady = () => {
    const name = document.getElementById("studentName").value.trim();
    const need = document.getElementById("studentNeed").value.trim();
    document.getElementById("submitBtn").disabled = !(name && need && selectedStudentLoc);
  };
  document.getElementById("studentName").addEventListener("input", window.checkSubmitReady);
  document.getElementById("studentNeed").addEventListener("input", window.checkSubmitReady);

  window.submitToQueue = async () => {
    const name = document.getElementById("studentName").value.trim();
    const need = document.getElementById("studentNeed").value.trim();
    if (!name || !need || !selectedStudentLoc) return;
    const newRef = push(ref(db, "queue"));
    await set(newRef, { name, need, studentLocation: selectedStudentLoc, timestamp: Date.now() });
    myItemId = newRef.key;
    myName = name;
    document.getElementById("submitForm").classList.add("hidden");
    document.getElementById("confirmationCard").classList.remove("hidden");
    document.getElementById("studentName").value = "";
    document.getElementById("studentNeed").value = "";
    document.querySelectorAll("#studentLocGrid .loc-btn").forEach(b => b.classList.remove("active"));
    selectedStudentLoc = null;
  };

  window.removeMyself = async () => {
    if (myItemId) await remove(ref(db, `queue/${myItemId}`));
    myItemId = null;
    document.getElementById("confirmationCard").classList.add("hidden");
    document.getElementById("submitForm").classList.remove("hidden");
  };

  // INSTRUCTOR
  window.checkPassword = () => {
    const pw = document.getElementById("passwordInput").value;
    if (pw === INSTRUCTOR_PASSWORD) {
      document.getElementById("passwordScreen").classList.add("hidden");
      document.getElementById("instructorDash").classList.remove("hidden");
      document.getElementById("pwError").classList.add("hidden");
    } else {
      document.getElementById("pwError").classList.remove("hidden");
    }
  };

  window._doneItem = (id) => remove(ref(db, `queue/${id}`));

  window.clearAll = async () => {
    if (confirm("Clear the entire queue?")) await remove(ref(db, "queue"));
  };

  // MODE TOGGLE
  window.toggleMode = () => {
    currentMode = currentMode === "student" ? "instructor" : "student";
    document.getElementById("studentView").classList.toggle("hidden", currentMode !== "student");
    document.getElementById("instructorView").classList.toggle("hidden", currentMode !== "instructor");
    document.querySelector(".mode-toggle").textContent = currentMode === "student" ? "Instructor" : "Student View";
    document.getElementById("passwordScreen").classList.remove("hidden");
    document.getElementById("instructorDash").classList.add("hidden");
    document.getElementById("passwordInput").value = "";
    document.getElementById("pwError").classList.add("hidden");
  };

  // HELPERS
  function timeAgo(ts) {
    const d = Math.floor((Date.now() - ts) / 1000);
    if (d < 60) return `${d}s ago`;
    if (d < 3600) return `${Math.floor(d/60)}m ago`;
    return `${Math.floor(d/3600)}h ago`;
  }
  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  buildLocGrids();
</script>
</body>
</html>
